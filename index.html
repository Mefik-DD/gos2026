<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Итоговое тестирование</title>
  <style>
    :root { --primary: #2563eb; --primary-hover: #1d4ed8; --success: #16a34a; --error: #dc2626; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-light: #64748b; --border: #e2e8f0; --highlight: #dbeafe; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.5; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { width: 100%; max-width: 800px; background: var(--card); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; }
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    h1, h2 { margin-bottom: 16px; color: var(--text); }
    p { color: var(--text-light); margin-bottom: 20px; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; transition: all 0.2s; }
    .btn.primary { background: var(--primary); color: white; }
    .btn.primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn.secondary { background: var(--border); color: var(--text); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .progress { font-size: 14px; color: var(--text-light); margin-bottom: 10px; text-align: right; }
    .question-box { background: #f1f5f9; padding: 16px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; }
    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .option { padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
    .option:hover { border-color: var(--primary); background: #f8fafc; }
    .option.selected { border-color: var(--primary); background: var(--highlight); font-weight: 500; }
    .option.correct { border-color: var(--success); background: #dcfce7; }
    .option.incorrect { border-color: var(--error); background: #fee2e2; }
    .open-input { width: 100%; padding: 12px; font-size: 16px; border: 2px solid var(--border); border-radius: 8px; transition: border 0.2s; }
    .open-input:focus { border-color: var(--primary); outline: none; }
    .open-input:disabled { background: #f1f5f9; cursor: not-allowed; }
    .feedback { margin: 20px 0; padding: 16px; border-radius: 8px; background: #f8fafc; border-left: 4px solid var(--text-light); }
    .feedback strong { display: block; margin-bottom: 4px; }
    .feedback .status { margin-top: 8px; font-weight: bold; }
    .feedback .status.ok { color: var(--success); }
    .feedback .status.err { color: var(--error); }
    .review-item { border-bottom: 1px solid var(--border); padding: 16px 0; }
    .review-item:last-child { border-bottom: none; }
    .review-q { font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .review-ans { font-size: 14px; margin-bottom: 4px; }
    .tag { padding: 4px 8px; border-radius: 4px; font-weight: 500; font-size: 13px; }
    .tag.ok { background: #dcfce7; color: var(--success); }
    .tag.err { background: #fee2e2; color: var(--error); }
    .tag.type { background: #f1f5f9; color: #64748b; }
    .nav { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    @media (max-width: 600px) { .container { padding: 20px; } }
  </style>
</head>
<body>
  <div class="container">
    <div id="screen-welcome" class="screen active">
      <h1> Итоговое государственное тестирование</h1>
      <p>В каждом тесте случайно выбирается 20 вопросов (выбор варианта + открытые). После ответа сразу отображается верный вариант.</p>
      <button id="btn-start" class="btn primary">▶ Пройти тест</button>
    </div>

    <div id="screen-test" class="screen">
      <div class="progress">Вопрос <span id="current-q">1</span> из 20</div>
      <div id="question-text" class="question-box"></div>
      <div id="options-container" class="options"></div>
      <div id="feedback" class="feedback hidden"></div>
      <div class="nav">
        <button id="btn-next" class="btn primary hidden" disabled>Следующий вопрос →</button>
      </div>
    </div>

    <div id="screen-results" class="screen">
      <h1>📊 Тест завершён</h1>
      <p>Ваш результат: <strong id="score">0</strong> из 20</p>
      <div class="nav">
        <button id="btn-review" class="btn secondary"> Посмотреть разбор</button>
        <button id="btn-retake" class="btn primary"> Пройти заново</button>
      </div>
    </div>

    <div id="screen-review" class="screen">
      <h2>📝 Разбор теста</h2>
      <div id="review-list"></div>
      <div class="nav" style="margin-top:20px;">
        <button id="btn-back" class="btn secondary">← Назад к результатам</button>
      </div>
    </div>
  </div>

  <script>
    // === БАЗА ВОПРОСОВ ===
    // Формат закрытых: { id, question, options: [{id, text}], correct: ['A', 'B'] }
    // Формат открытых: { id, type: 'open', question, correct: ['Ответ 1', 'Ответ 2'] }
    const questionsDB = [
      // === ДИСЦИПЛИНА 1: Безопасность ОС и БД ===
  {id:1,question:"Как в 2026 году наиболее полно определяется безопасность операционной системы в условиях гибридных инфраструктур?",options:[{id:"A",text:"Только антивирусная защита ядра"},{id:"B",text:"Установка патчей раз в месяц"},{id:"C",text:"Комплексная защита: изоляция процессов, контроль целостности, аппаратное доверие, мониторинг поведения"},{id:"D",text:"Только шифрование диска"}],correct:["C"]},
  {id:2,question:"Какие три базовых принципа ИБ остаются фундаментальными для защиты ОС в эпоху AI и облаков?",options:[{id:"A",text:"Шифрование, аутентификация, логирование"},{id:"B",text:"EDR, SIEM, SOAR"},{id:"C",text:"Политики, процедуры, KPI"},{id:"D",text:"Конфиденциальность, целостность, доступность (CIA)"}],correct:["D"]},
  {id:3,question:"Что означает целостность ОС в контексте защиты от rootkit и fileless-атак в 2026?",options:[{id:"A",text:"Регулярное резервное копирование"},{id:"B",text:"Контроль целостности ядра, драйверов и системных вызовов через TPM и измеримую загрузку"},{id:"C",text:"Только антивирусное сканирование"},{id:"D",text:"Запрет на установку стороннего ПО"}],correct:["B"]},
  {id:4,question:"Как обеспечивается безопасная загрузка (Secure Boot) в современных ОС с учётом угроз 2026?",options:[{id:"A",text:"Только пароль на BIOS"},{id:"B",text:"Цепочка доверия от UEFI до ядра с верификацией подписей и измерением компонентов"},{id:"C",text:"Отключение всех внешних устройств"},{id:"D",text:"Использование только отечественного ПО"}],correct:["B"]},
  {id:5,question:"Что подразумевает защита памяти в ОС 2026 для предотвращения эксплойтов типа ROP/JOP?",options:[{id:"A",text:"Только DEP/NX-bit"},{id:"B",text:"ASLR + CFG + CET + изоляция кучи/стека + использование memory-safe языков в критических компонентах"},{id:"C",text:"Увеличение объёма RAM"},{id:"D",text:"Запрет на выполнение кода в пользовательском пространстве"}],correct:["B"]},
  {id:6,question:"Какой механизм ОС критичен для защиты от эскалации привилегий через уязвимости ядра?",options:[{id:"A",text:"Брандмауэр Windows"},{id:"B",text:"Mandatory Access Control (SELinux/AppArmor/SMACK) + sandboxing процессов"},{id:"C",text:"Антивирус в реальном времени"},{id:"D",text:"Регулярная дефрагментация"}],correct:["B"]},
  {id:7,question:"Какова главная цель применения Confidential Computing в ОС 2026?",options:[{id:"A",text:"Ускорение работы приложений"},{id:"B",text:"Защита данных в использовании (in-use) через аппаратные анклавы (SGX/SEV/TDX)"},{id:"C",text:"Снижение потребления энергии"},{id:"D",text:"Упрощение администрирования"}],correct:["B"]},
  {id:8,question:"Какой аспект безопасности ОС обеспечивает устойчивость к компрометации учётных записей с высокими привилегиями?",options:[{id:"A",text:"Сложные пароли"},{id:"B",text:"LAPS + PAM-модули + JIT-привилегии + аудит сессий"},{id:"C",text:"Запрет на удалённый вход"},{id:"D",text:"Только двухфакторная аутентификация"}],correct:["B"]},
  {id:9,question:"В чём ключевой риск использования неподписанных драйверов в ОС 2026?",options:[{id:"A",text:"Замедление загрузки"},{id:"B",text:"Возможность обхода механизмов защиты ядра и установки rootkit"},{id:"C",text:"Несовместимость с облачными сервисами"},{id:"D",text:"Увеличение потребления трафика"}],correct:["B"]},
  {id:10,question:"Какой метод защиты данных на уровне ОС остаётся наиболее эффективным против физического доступа к устройству?",options:[{id:"A",text:"Пароль на вход"},{id:"B",text:"Полнодисковое шифрование (LUKS/BitLocker) с привязкой к TPM и предзагрузочной аутентификацией"},{id:"C",text:"Скрытие разделов"},{id:"D",text:"Только биометрия"}],correct:["B"]},
  {id:11,question:"Как обеспечивается изоляция контейнеров от хост-ОС в 2026?",options:[{id:"A",text:"Только namespaces"},{id:"B",text:"Namespaces + cgroups + seccomp + AppArmor/SELinux + gVisor/Kata Containers для повышенной изоляции"},{id:"C",text:"Запуск от root"},{id:"D",text:"Отключение сети"}],correct:["B"]},
  {id:12,question:"Что является базовым элементом защиты периметра на уровне ОС при исчезновении классического сетевого периметра?",options:[{id:"A",text:"Физическая охрана сервера"},{id:"B",text:"Host-based firewall + eBPF-фильтрация + микросегментация на уровне процессов"},{id:"C",text:"Запрет на использование Wi-Fi"},{id:"D",text:"Только антивирус"}],correct:["B"]},
  {id:13,question:"Какой компонент ОС является ключевым для контроля доступа в Zero Trust-модели на уровне хоста?",options:[{id:"A",text:"Локальный файрвол"},{id:"B",text:"Identity-aware PAM + контекстная авторизация + непрерывная аттестация состояния хоста"},{id:"C",text:"DNS-фильтрация"},{id:"D",text:"Антивирус на шлюзе"}],correct:["B"]},
  {id:14,question:"Какая технология ОС наиболее эффективна для предотвращения утечек через неавторизованные процессы?",options:[{id:"A",text:"Запрет на копирование файлов"},{id:"B",text:"DLP-агент на уровне ядра + контроль буфера обмена + маркировка данных через LSM"},{id:"C",text:"Блокировка USB"},{id:"D",text:"Только шифрование"}],correct:["B"]},
  {id:15,question:"Какая современная угроза наиболее актуальна для ядра ОС в 2026?",options:[{id:"A",text:"Только переполнение буфера"},{id:"B",text:"Supply chain-атаки на компоненты ядра + AI-генерируемые эксплойты + уязвимости в eBPF-программах"},{id:"C",text:"Только фишинг"},{id:"D",text:"Физическая кража"}],correct:["B"]},
  {id:16,question:"Какой механизм ОС обеспечивает верификацию целостности системных файлов и конфигураций?",options:[{id:"A",text:"Регулярное резервное копирование"},{id:"B",text:"IMA/EVM + dm-verity + подписанные обновления через OSTree"},{id:"C",text:"Ручная проверка администратором"},{id:"D",text:"Только контрольные суммы"}],correct:["B"]},
  {id:17,question:"Какая практика повышает устойчивость ОС к zero-day уязвимостям в 2026?",options:[{id:"A",text:"Использование только сертифицированного ПО"},{id:"B",text:"Hardening по CIS/STIG + минимизация attack surface + runtime protection (EDR) + sandboxing"},{id:"C",text:"Только установка патчей"},{id:"D",text:"Ежегодный аудит"}],correct:["B"]},
  {id:18,question:"Какой тип атак на уровне ОС доминирует в ландшафте угроз 2026?",options:[{id:"A",text:"Только брутфорс паролей"},{id:"B",text:"Атаки на цепочки поставок ПО + компрометация CI/CD + эксплуатация уязвимостей в механизмах виртуализации"},{id:"C",text:"Только SQL-инъекции"},{id:"D",text:"Физическое проникновение"}],correct:["B"]},
  {id:19,question:"Какой инструмент критичен для проактивного анализа безопасности на уровне ОС в 2026?",options:[{id:"A",text:"Только антивирусы"},{id:"B",text:"EDR/XDR с телеметрией ядра + поведенческий анализ через eBPF + AI-детекция аномалий"},{id:"C",text:"Ручной анализ логов"},{id:"D",text:"Только сканеры уязвимостей"}],correct:["B"]},
  {id:20,question:"Какой метод наиболее эффективен для предотвращения несанкционированного доступа к сессиям в ОС?",options:[{id:"A",text:"Ежемесячная смена паролей"},{id:"B",text:"Credential Guard + LSA isolation + WebAuthn + адаптивная MFA на уровне PAM"},{id:"C",text:"Запрет на удалённую работу"},{id:"D",text:"Только сложные пароли"}],correct:["B"]},
  {id:21,question:"Какая категория инсайдеров представляет наибольший риск для безопасности ОС в 2026?",options:[{id:"A",text:"Только стажёры"},{id:"B",text:"Учётные записи с избыточными привилегиями + скомпрометированные сервисные аккаунты + злонамеренные администраторы"},{id:"C",text:"Только бывшие сотрудники"},{id:"D",text:"Только недовольные сотрудники"}],correct:["B"]},
  {id:22,question:"Какая мера защиты от вредоносного ПО актуальна в эпоху fileless-атак на уровне ОС?",options:[{id:"A",text:"Только брандмауэры"},{id:"B",text:"AMSI + ETW-мониторинг + поведенческий анализ PowerShell/WMI + блокировка LOLBins"},{id:"C",text:"Запрет на загрузку файлов"},{id:"D",text:"Только сигнатурные антивирусы"}],correct:["B"]},
  {id:23,question:"Какая стратегия предотвращает утечки через системные журналы и телеметрию ОС?",options:[{id:"A",text:"Только отключение логирования"},{id:"B",text:"Централизованный сбор логов с шифрованием + маскирование PII + контроль доступа к audit-подсистеме"},{id:"C",text:"Запрет на облака"},{id:"D",text:"Только блокировка внешних сервисов"}],correct:["B"]},
  {id:24,question:"Какая организационная мера наиболее эффективна для формирования культуры безопасности администрирования ОС?",options:[{id:"A",text:"Штрафы за нарушения"},{id:"B",text:"Непрерывное микрообучение + симуляции атак на ОС + геймификация hardening-практик"},{id:"C",text:"Только подписание NDA"},{id:"D",text:"Ежегодные лекции"}],correct:["B"]},
  {id:25,question:"Какая технология защищает межпроцессное взаимодействие (IPC) в ОС 2026?",options:[{id:"A",text:"Только права доступа к файлам"},{id:"B",text:"Mandatory IPC control + sandboxing + верификация источников сообщений через capabilities"},{id:"C",text:"Только VPN"},{id:"D",text:"Только SSL/TLS"}],correct:["B"]},
  {id:26,question:"Какой шаг входит в современный процесс реагирования на инциденты на уровне ОС?",options:[{id:"A",text:"Только отключение заражённых систем"},{id:"B",text:"Автоматизированная изоляция процесса + сбор форензики через Volatility/eBPF + сохранение памяти для анализа"},{id:"C",text:"Только уведомление руководства"},{id:"D",text:"Только восстановление из бэкапа"}],correct:["B"]},
  {id:27,question:"Какова основная цель требований ФСТЭК к защите ОС в РФ к 2026?",options:[{id:"A",text:"Упрощение требований для малого бизнеса"},{id:"B",text:"Полный запрет на иностранные ОС"},{id:"C",text:"Унификация с международными стандартами любой ценой"},{id:"D",text:"Баланс между суверенитетом, защитой от уязвимостей и поддержкой современных архитектур"}],correct:["D"]},
  {id:28,question:"Кто несёт персональную ответственность за безопасность конфигурации ОС в организации?",options:[{id:"A",text:"Внешние аудиторы"},{id:"B",text:"Только системные администраторы"},{id:"C",text:"Владелец актива + CISO + ответственный за эксплуатацию с чётким разделением обязанностей"},{id:"D",text:"Только CISO"}],correct:["C"]},
  {id:29,question:"Что включает compliance с требованиями по защите ОС в 2026?",options:[{id:"A",text:"Только использование сертифицированных СКЗИ"},{id:"B",text:"Только ежегодный отчёт"},{id:"C",text:"Непрерывный мониторинг конфигураций + автоматизированная проверка hardening + сбор доказательств через SCM"},{id:"D",text:"Только формальное соответствие"}],correct:["C"]},
  {id:30,question:"Как изменилась роль регуляторов в части требований к ОС в 2026?",options:[{id:"A",text:"Только реагирование на инциденты"},{id:"B",text:"Только лицензирование"},{id:"C",text:"Только контроль и штрафы"},{id:"D",text:"Проактивное взаимодействие + риск-ориентированный надзор + регуляторные sandbox для тестирования защищённых ОС"}],correct:["D"]},
  {id:31,question:"Какие KPI используются для оценки системы защиты ОС?",options:[{id:"A",text:"% хостов с актуальным hardening-конфигурациям"},{id:"B",text:"Среднее время устранения уязвимостей критического уровня"},{id:"C",text:"Уровень удовлетворенности клиентов"},{id:"D",text:"Число проведенных совещаний"}],correct:["A","B"]},
  {id:32,question:"Какие меры обеспечивают отказоустойчивость ОС при форс-мажорных обстоятельствах?",options:[{id:"A",text:"Резервное копирование конфигураций и состояний"},{id:"B",text:"Кластеризация + автоматический failover на уровне гипервизора/оркестратора"},{id:"C",text:"Архивное хранение логов"},{id:"D",text:"Экспорт данных в другие форматы"}],correct:["A","B"]},
  {id:33,question:"Какие меры применяются для защиты от угроз внутренней безопасности на уровне ОС?",options:[{id:"A",text:"Разграничение прав через sudo/PAM + mandatory access control"},{id:"B",text:"Аудит действий привилегированных пользователей + UEBA для детекции аномалий"},{id:"C",text:"Использование облачных хранилищ"},{id:"D",text:"Постоянный контроль качества работы оборудования"}],correct:["A","B"]},
  {id:34,question:"Какие современные технологии используют для обеспечения безопасности в IoT-ОС?",options:[{id:"A",text:"Минималистичное ядро + верификация обновлений"},{id:"B",text:"Secure boot + TPM + регулярное OTA-обновление с подписью"},{id:"C",text:"Отключение устройств от интернета"},{id:"D",text:"Уникальные идентификаторы устройств + аттестация состояния"}],correct:["A","B","D"]},
  {id:35,question:"Какие процессы включают эксплуатацию защищённой ОС?",options:[{id:"A",text:"Непрерывный мониторинг целостности и конфигураций"},{id:"B",text:"Автоматизированная реакция на инциденты (SOAR) на уровне хоста"},{id:"C",text:"Установка новых программ без контроля"},{id:"D",text:"Продажа устаревшего оборудования"}],correct:["A","B"]},

{id:335,question:"Цепочки создания добавленной стоимости подразделяются на …",options:[{id:"A",text:"Первичные и вторичные"},{id:"B",text:"Основные и дополнительные"},{id:"C",text:"Главные и второстепенные"},{id:"D",text:"Основные и вспомогательные"}],correct:["A"]},
{id:336,question:"Статус центра прибыли имеет …",options:[{id:"A",text:"Основное производственное подразделение"},{id:"B",text:"Предприятие"},{id:"C",text:"Финансовая служба предприятия"},{id:"D",text:"Отдел"}],correct:["B"]},
{id:337,question:"Основной деятельностью компании является производство счетчиков расхода жидкостей и оказание услуг по их монтажу на местах эксплуатации. Для обеспечения этой деятельности компания также осуществляет изготовление упаковочной тары и доставку счетчиков клиентам. Сколько первичных цепочек создания добавленной стоимости существует на предприятии?",options:[{id:"A",text:"1"},{id:"B",text:"2"},{id:"C",text:"4"},{id:"D",text:"5"}],correct:["B"]},
{id:338,question:"Предприятие, занимающееся производством, поставкой и обслуживанием компьютерных систем, создало свой учебный центр для подготовки производственного персонала. В дальнейшем центр стал осуществлять также самостоятельную деятельность по переподготовке сотрудников компаний-заказчиков. К какому виду цепочек создания добавленной стоимости относится деятельность учебного центра теперь?",options:[{id:"A",text:"К вторичной, так как не связана с основной деятельностью"},{id:"B",text:"К первичной, так как это стало новым видом деятельности предприятия"},{id:"C",text:"К первичной для внешних заказчиков, так как это стало новым видом деятельности предприятия, к вторичной - для внутренних заказчиков"},{id:"D",text:"К вторичной, так как связана с основной деятельностью"}],correct:["C"]},
{id:339,question:"Основные подходы к моделированию бизнес-процессов делятся на:",options:[{id:"A",text:"Функциональные и объектно-ориентированные"},{id:"B",text:"Детерминированные и стохастические"},{id:"C",text:"Информационные и причинно-следственные"},{id:"D",text:"Логические и диаграммные"}],correct:["A"]},
{id:340,question:"Целями моделирования бизнес-процессов являются:",options:[{id:"A",text:"Построение наилучшей модели"},{id:"B",text:"Ускорение выполнения проекта"},{id:"C",text:"Анализ недостатков фирмы и построение лучшей модели фирмы"},{id:"D",text:"Минимизация стоимости проекта"}],correct:["C"]},
{id:341,question:"Технология моделирования бизнес-процессов - это процесс …",options:[{id:"A",text:"Отражения субъективного видения потока работ в виде формальной модели, состоящей из взаимосвязанных операций"},{id:"B",text:"Определения стоимости рабочего места исполнителя процесса"},{id:"C",text:"Использования машинных программ классификации и структуризации бизнес-процессов"},{id:"D",text:"Поэтапного описания существующих бизнес-процессов"}],correct:["A"]},
{id:342,question:"Функция управления - это …",options:[{id:"A",text:"Направление деятельности элемента организационной структуры, представляющее собой совокупность однородных операций (действий), выполняемых на постоянной основе"},{id:"B",text:"Математическая модель, описывающая действия аппарата управления"},{id:"C",text:"Направление деятельности элемента организационной структуры, представляющее собой совокупность однородных операций (действий)"},{id:"D",text:"Определение стоимости рабочего места исполнителя процесса"}],correct:["A"]},
{id:343,question:"Функционально-стоимостный анализ - это …",options:[{id:"A",text:"Метод определения стоимости и других характеристик изделий, услуг и потребителей, в основе которого лежит использование функций и ресурсов, задействованных в производстве, маркетинге, продаже, доставке, технической поддержке, оказании услуг, обслуживании клиентов, а также в обеспечении качества"},{id:"B",text:"Определение стоимости рабочего места исполнителя процесса, определение коэффициента трудового вклада исполнителя и других корректирующих коэффициентов, а также формирование отчета по результатам функционально-стоимостного анализа"},{id:"C",text:"Один из методов, позволяющий указать на возможные пути улучшения стоимостных показателей, цель которого - достичь улучшений в работе предприятий по показателям стоимости, трудоемкости и производительности"},{id:"D",text:"Математическая модель, описывающая действия аппарата управления"}],correct:["A"]},
{id:344,question:"Методология функционально-стоимостного анализа при моделировании бизнес-процессов - это …",options:[{id:"A",text:"Анализ функций, который позволяет сначала определять стоимостные затраты на выполнение процессов, далее стоимость функций переносится на стоимостные объекты"},{id:"B",text:"Анализ бизнес-процессов с целью выбрать процессы с наиболее низкой стоимостью и рекомендовать увеличить их долю в структуре выпускаемых изделий производстве"},{id:"C",text:"Анализ бизнес-процессов с целью максимально сократить количество выпускаемой продукции, не добавляющей стоимость предприятию"},{id:"D",text:"Определение стоимости рабочего места исполнителя процесса, определение коэффициента трудового вклада исполнителя и других корректирующих коэффициентов, а также формирование отчета по результатам функционально-стоимостного анализа"}],correct:["A"]},
{id:345,question:"В основе метода … лежит предположение, что «деятельность потребляет ресурсы, а продукция потребляет деятельность».",options:[{id:"A",text:"ABC"},{id:"B",text:"АСЦ"},{id:"C",text:"SWOT"},{id:"D",text:"PEST"}],correct:["A"]},
{id:346,question:"… - это экономические элементы, необходимые для осуществления деятельности, источник затрат.",options:[{id:"A",text:"Механизмы"},{id:"B",text:"Ресурсы"},{id:"C",text:"Связи"},{id:"D",text:"Воздействия"}],correct:["B"]},
{id:347,question:"Фактор затрат - это …",options:[{id:"A",text:"Показатель, оценивающий результаты деятельности"},{id:"B",text:"Характеристика, определяющая рабочую нагрузку и усилия, требуемые для осуществления деятельности, а также необходимые ресурсы"},{id:"C",text:"Показатель потребления ресурса, используемый для определения доли от общих затрат ресурсов, присваиваемой каждому виду деятельности, использующему данный ресурс"},{id:"D",text:"Математическая модель, описывающая действия аппарата управления"}],correct:["B"]},
{id:348,question:"Для окраски готового изделия требуется 1,5 банки краски стоимостью 200 рублей за банку, процесс длится 1 час. Какова стоимость окраски изделия, если нормо-час работы маляра стоит 300 рублей, а другие ресурсы не используются?",options:[{id:"A",text:"500 рублей"},{id:"B",text:"600 рублей"},{id:"C",text:"650 рублей"},{id:"D",text:"950 рублей"}],correct:["B"]},
{id:349,question:"Как повлияет на стоимость замена краски, если при стоимости банки 100 рублей время процесса увеличится на 50%?",options:[{id:"A",text:"Стоимость уменьшится вдвое"},{id:"B",text:"Стоимость увеличится вдвое"},{id:"C",text:"Стоимость не изменится"},{id:"D",text:"Стоимость попеременно будет меняться"}],correct:["C"]},
{id:350,question:"Бизнес-процесс оказания услуг включает функцию 1, повторяющуюся в разных комбинациях 5 раз, и функцию 2, повторяющуюся 4 раза. Чему равна стоимость бизнес-процесса, если стоимость функции 1 составляет 600 рублей, а функции 2 - 800 рублей?",options:[{id:"A",text:"6200 рублей"},{id:"B",text:"6400 рублей"},{id:"C",text:"64000 рублей"},{id:"D",text:"62000 рублей"}],correct:["A"]},
{id:351,question:"Если в результате оптимизации любой из этих функций (но только одной одновременно) можно снизить ее стоимость на 100 рублей, какую функцию стоит оптимизировать?",options:[{id:"A",text:"Функцию 2, так как ее стоимость выше"},{id:"B",text:"Функцию 1, так как она повторяется чаще"},{id:"C",text:"В обоих случаях результат равнозначен"},{id:"D",text:"В обоих случаях результат неравнозначен"}],correct:["B"]},
{id:352,question:"Предприятие, работающее на конкурентном и динамичном рынке услуг, собирается реализовать ИСУП. Поступили предложения от интеграторов: внедрить монолитную систему, решающую все текущие задачи, и построить сервисно-ориентированную систему на основе действующих продуктов. Какой путь Вы выберите, если ценовые предложения интеграторов равны? Почему?",options:[{id:"A",text:"Сервисно-ориентированную систему, так как она позволяет повысить скорость адаптации бизнеса к быстроменяющимся требованиям рынка"},{id:"B",text:"Рыночную систему, так как она не позволяет сократить расходы на ИТ-системы на основе повторного использования их функциональных компонентов"},{id:"C",text:"Монолитную систему, так как отказ от разнородных систем позволяет снизить расходы на ИТ"},{id:"D",text:"Монолитную систему, так как подобные системы опираются на лучшие практики бизнес-процессов"}],correct:["A"]},
{id:353,question:"Физическая сущность реинжиниринга - это …",options:[{id:"A",text:"Разделение предприятия на самостоятельно функционирующие участки с контролем на входе и выходе процессов"},{id:"B",text:"Технологическая модернизация предприятия"},{id:"C",text:"Переформирование подразделений предприятия на основе новой структуры"},{id:"D",text:"Перераспределение прав, ответственности и полномочий в соответствии с выбранной стратегией"}],correct:["A"]},
{id:354,question:"Логическая сущность реинжиниринга - это …",options:[{id:"A",text:"Технико-технологическая модернизация предприятия на основе информационных технологий"},{id:"B",text:"Оптимизация организационной структуры предприятия в соответствии с выбранной стратегией"},{id:"C",text:"Переход организации на выпуск конкурентоспособной продукции"},{id:"D",text:"Новая структурированная форма управления предприятием на основе информационных технологий"}],correct:["D"]},
{id:355,question:"Каковы ключевые факторы успеха реинжиниринга бизнес-процессов?",options:[{id:"A",text:"Мотивация персонала в РБП"},{id:"B",text:"Привлечение консультантов к РБП"},{id:"C",text:"Переход организации на выпуск конкурентоспособной продукции"},{id:"D",text:"Оптимизация организационной структуры предприятия"}],correct:["A"]},
{id:356,question:"… бизнес-процесса - это степень соответствия реального бизнес-процесса своему документальному описанию.",options:[{id:"A",text:"Эффективность"},{id:"B",text:"Определенность"},{id:"C",text:"Результативность"},{id:"D",text:"Ресурсоемкость"}],correct:["B"]},
{id:357,question:"Прямой инжиниринг - это…",options:[{id:"A",text:"Построение новой организации бизнес-процессов"},{id:"B",text:"Исследование существующей организации бизнес-процессов"},{id:"C",text:"Оптимизация бизнес-процессов"},{id:"D",text:"Привлечение консультантов к РБП"}],correct:["A"]},
{id:358,question:"Процессное управление предприятием - это …",options:[{id:"A",text:"Описанные и утвержденные конкретные процессы управления протекающими на предприятии производственными процессами"},{id:"B",text:"Управление производством деталей и выполнением услуг на предприятии"},{id:"C",text:"Совокупность взаимосвязанных или взаимодействующих видов деятельности, преобразующая «входы» в «выходы»"},{id:"D",text:"Исследование существующей организации бизнес-процессов"}],correct:["A"]},
{id:359,question:"Вы собираетесь открыть собственный интернет-магазин и задумались о проектировании его бизнес-процессов. Чем это будет являться в отношении бизнес-процессов?",options:[{id:"A",text:"Обратным инжинирингом"},{id:"B",text:"Прямым инжинирингом"},{id:"C",text:"Реинжинирингом"},{id:"D",text:"Коинжинирингом"}],correct:["B"]},
{id:360,question:"Первой фазой действий станет …",options:[{id:"A",text:"Анализ текущих бизнес-процессов"},{id:"B",text:"Планирование бизнес-процессов"},{id:"C",text:"Мониторинг бизнес-процессов"},{id:"D",text:"Прогнозирование бизнес-процессов"}],correct:["B"]},
{id:361,question:"Какие из перечисленных характеристик являются обязательными признаками проекта?",options:[{id:"A",text:"Временный характер"},{id:"B",text:"Большой бюджет"},{id:"C",text:"Уникальность цели"},{id:"D",text:"Использование аутсорсинга"}],correct:["A","C"]},
{id:362,question:"Какие из следующих ролей в процессном управлении несут ответственность за непосредственное управление и результаты процесса?",options:[{id:"A",text:"Владелец процесса"},{id:"B",text:"Процессный аналитик"},{id:"C",text:"Менеджер процесса"},{id:"D",text:"Проектировщик процессов"}],correct:["A","C"]},
{id:363,question:"Какие из перечисленных методов являются правильными для сбора информации при моделировании бизнес-процессов?",options:[{id:"A",text:"Рабочие семинары с участниками процесса"},{id:"B",text:"Последовательное интервьюирование экспертов"},{id:"C",text:"Анализ существующей документации компании"},{id:"D",text:"Использование только должностных инструкций"}],correct:["A","B","C"]},
{id:364,question:"Какие из перечисленных элементов относятся к основным WF-паттернам (шаблонам workflow)?",options:[{id:"A",text:"Последовательность (Sequence)"},{id:"B",text:"Параллельное расщепление (AND-split)"},{id:"C",text:"Дискриминатор (Discriminator)"},{id:"D",text:"Исключающий выбор (XOR-split)"}],correct:["A","B","D"]},
{id:365,question:"Какие из перечисленных технологий и стандартов относятся к экосистеме BPM (Business Process Management)?",options:[{id:"A",text:"Системы управления бизнес-процессами (BPMS)"},{id:"B",text:"Сервис-ориентированная архитектура (SOA)"},{id:"C",text:"Системы управления бизнес-правилами (BRMS)"},{id:"D",text:"Системы управления взаимоотношениями с клиентами (CRM)"}],correct:["A","B","C"]},
{id:366,question:"Какие из следующих принципов относятся к принципам перепроектирования бизнес-процессов по Хаммеру?",options:[{id:"A",text:"Горизонтальное сжатие процессов"},{id:"B",text:"Увеличение количества проверок и согласований"},{id:"C",text:"Децентрализация ответственности"},{id:"D",text:"Сохранение линейной последовательности этапов"}],correct:["A","C"]},
{id:367,question:"Какие из перечисленных критериев используются для выбора приоритетных процессов для оптимизации?",options:[{id:"A",text:"Количество сотрудников в процессе"},{id:"B",text:"Важность процесса для стратегических целей"},{id:"C",text:"Степень проблемности процесса"},{id:"D",text:"Возраст руководителя подразделения"}],correct:["B","C"]},
{id:368,question:"Какие из перечисленных уровней изменений бизнес-модели относятся к классификации Run-Change-Disrupt?",options:[{id:"A",text:"Run (автоматизация)"},{id:"B",text:"Improve (улучшение)"},{id:"C",text:"Change (качественное изменение)"},{id:"D",text:"Disrupt (переосмысление)"}],correct:["A","C","D"]},
{id:369,question:"Какие из следующих характеристик должны быть у показателей эффективности процессов?",options:[{id:"A",text:"Сбалансированность и взаимосвязанность"},{id:"B",text:"Максимальная сложность расчета"},{id:"C",text:"Ориентированность на внутренние удобства"},{id:"D",text:"Подкрепленность стимулами"}],correct:["A","D"]},
{id:370,question:"Какие из перечисленных ошибок являются типичными при проведении реинжиниринга?",options:[{id:"A",text:"Фундаментальное переосмысление процессов"},{id:"B",text:"Попытка улучшить, а не перепроектировать процесс"},{id:"C",text:"Недостаточное ресурсное обеспечение"},{id:"D",text:"Слишком активное участие топ-менеджмента"}],correct:["B","C"]},
{id:371,question:"Какие из перечисленных характеристик являются обязательными признаками проекта?",options:[{id:"A",text:"Временный характер"},{id:"B",text:"Большой бюджет"},{id:"C",text:"Уникальность цели"},{id:"D",text:"Использование аутсорсинга"}],correct:["A","C"]},

// === ОТКРЫТЫЕ ВОПРОСЫ (Дисц. 5, ID: 411-420) ===
{id:411,type:'open',question:"Студенту поручено самостоятельно подготовить реферат на основе выданного задания, соблюдая сроки и правила оформления, используя персональный компьютер и Интернет. Что будет являться входом, выходом, управлением и механизмами IDEF0-модели бизнес-процесса подготовки реферата?",correct:["Вход = задание; выход = реферат; механизмы: персональный компьютер и Интернет; управление: сроки и правила оформления."]},
{id:412,type:'open',question:"Что такое бизнес-процесс?",correct:["Он представляет собой систему последовательных, целенаправленных и регламентированных видов деятельности, в которой посредством управляющего воздействия и с помощью определенных ресурсов за определенное время входы процесса преобразуются в выходы - в результаты, представляющие ценность для потребителя и приносящие прибыль изготовителю."]},
{id:413,type:'open',question:"Какие выделяют виды бизнес-процессов в масштабах предприятия?",correct:["Основные, вспомогательные, поддерживающие и управленческие процессы."]},
{id:414,type:'open',question:"От чего зависит разделение на основные и вспомогательные процессы?",correct:["В определяющей степени зависит от предметной области и направления деятельности предприятия."]},
{id:415,type:'open',question:"Какие модели и каким образом используются при проектировании информационных систем?",correct:["На сегодняшний день получили распространение три основные методологии функционального моделирования (и сопутствующий им инструментарий): IDEF (Integrated DEFinition), UML (Unified Modeling Language) и ARIS (Architecture of Integrated Information Systems). Для каждой из них существуют определенные программные продукты, которые помимо разработки позволяют проводить преобразования и операции для последующей работы с полученными моделями."]},
{id:416,type:'open',question:"Какие программные средства используются для моделирования процессов при разработке информационных систем?",correct:["Наибольшее распространение сегодня получили программные продукты BPWin, содержащие методологии IDEF0, IDEF3, DFD (Data Flow Diagrams) и ERWin (IDEF1x) от компании Computer Associates. В последнее время на российском рынке появился программный продукт Business Studio, который специально создан для работы с методами IDEF и обладает интуитивным и дружественным интерфейсом (User-friendly Interface)."]},

// === ФУНКЦИЯ ДЛЯ ВОПРОСОВ НА СООТВЕТСТВИЕ ===
function renderMatchingQuestion(q) {
  // Парсим вопрос для извлечения элементов
  // Формат: "1. Понятие1; 2. Понятие2; ... А) Определение1; Б) Определение2..."
  
  const leftItems = [];
  const rightItems = [];
  
  // Извлекаем левую часть (цифры 1, 2, 3...)
  const leftMatch = q.question.match(/(\d+\.[^;А-ЯA-Z]+)/g);
  if (leftMatch) {
    leftMatch.forEach(item => {
      const clean = item.replace(/^\d+\.\s*/, '').trim();
      if (clean) leftItems.push(clean);
    });
  }
  
  // Извлекаем правую часть (буквы А), Б), В)...)
  const rightMatch = q.question.match(/([А-ЯA-Z][\)\.]\s*[^;1-9]+)/g);
  if (rightMatch) {
    rightMatch.forEach(item => {
      const clean = item.replace(/^[А-ЯA-Z][\)\.]\s*/, '').trim();
      if (clean) rightItems.push(clean);
    });
  }
  
  // Если не удалось распарсить, используем варианты ответа
  if (leftItems.length === 0 && q.options) {
    q.options.forEach(opt => {
      if (opt.text.includes('-')) {
        const parts = opt.text.split('-');
        if (parts[0].match(/^\d/)) {
          leftItems.push(parts[0].trim());
        } else if (parts[0].match(/^[А-ЯA-Z]/)) {
          rightItems.push(parts[0].trim());
        }
      }
    });
  }
  
  // Создаем HTML
  let html = '<div class="matching-container" style="margin: 20px 0;">';
  html += '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">';
  html += '<div style="font-weight: 600; color: var(--text-light);">Понятие</div>';
  html += '<div style="font-weight: 600; color: var(--text-light);">Определение</div>';
  html += '</div>';
  
  leftItems.forEach((item, idx) => {
    html += `
      <div class="matching-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; padding: 12px; background: #f8fafc; border-radius: 8px; border: 2px solid #e2e8f0;">
        <div style="display: flex; align-items: center; font-weight: 500;">
          ${idx + 1}. ${item}
        </div>
        <select data-match="${idx}" class="matching-select" 
                style="width: 100%; padding: 10px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: white;">
          <option value="">Выберите соответствие...</option>
          ${rightItems.map((right, rIdx) => `
            <option value="${rIdx}">${String.fromCharCode(1040 + rIdx)}) ${right}</option>
          `).join('')}
        </select>
      </div>
    `;
  });
  
  html += '</div>';
  html += `<button id="btn-check-matching" class="btn primary" style="margin-top: 10px;">
    ✅ Проверить соответствие
  </button>`;
  
  els.options.innerHTML = html;
  
  // Обработчик проверки
  document.getElementById('btn-check-matching').onclick = () => {
    checkMatchingAnswer(q, leftItems.length, rightItems);
  };
}

// === ПРОВЕРКА ОТВЕТА НА СООТВЕТСТВИЕ ===
function checkMatchingAnswer(q, totalItems, rightItems) {
  if (answered) return;
  
  const selects = document.querySelectorAll('.matching-select');
  const userAnswers = Array.from(selects).map(s => s.value);
  
  // Проверяем, все ли выбрано
  if (userAnswers.some(val => val === '')) {
    alert('Пожалуйста, выберите соответствие для всех пунктов!');
    return;
  }
  
  // Формируем ответ пользователя в формате "1-А, 2-Б, 3-В"
  const userAnswerStr = userAnswers.map((val, idx) => {
    const letter = String.fromCharCode(1040 + parseInt(val)); // А, Б, В...
    return `${idx + 1}-${letter}`;
  }).join(', ');
  
  // Сравниваем с правильным ответом
  const correctAnswer = q.correct[0] || q.correct;
  const isCorrect = userAnswerStr === correctAnswer;
  
  // Подсветка правильных/неправильных
  selects.forEach((select, idx) => {
    const selectedVal = select.value;
    const correctVal = correctAnswer.match(new RegExp(`${idx + 1}-([А-ЯA-Z])`))?.[1];
    const correctIdx = correctVal ? correctVal.charCodeAt(0) - 1040 : -1;
    
    const isMatch = parseInt(selectedVal) === correctIdx;
    select.style.borderColor = isMatch ? 'var(--success)' : 'var(--error)';
    select.style.background = isMatch ? '#dcfce7' : '#fee2e2';
    select.disabled = true;
  });
  
  answered = true;
  state.answers.push({ q, selected: [userAnswerStr], isCorrect });
  
  els.feedback.innerHTML = `
    <p><strong>Правильный ответ:</strong> ${correctAnswer}</p>
    <p class="status ${isCorrect ? 'ok' : 'err'}">
      ${isCorrect ? '✅ Все верно!' : '❌ Есть ошибки'}
    </p>
  `;
  els.feedback.classList.remove('hidden');
  
  document.getElementById('btn-check-matching').disabled = true;
  els.btnNext.classList.remove('hidden');
  els.btnNext.disabled = false;
}

// === ПРОВЕРКА ОТКРЫТОГО ВОПРОСА ===
function checkOpenAnswer(q) {
  if (answered) return;
  
  const input = document.getElementById('open-answer');
  const userAns = input.value.trim();
  
  if (!userAns) {
    alert('Введите ответ!');
    return;
  }
  
  const correctArr = q.correct.map(a => normalize(a));
  const isCorrect = correctArr.includes(normalize(userAns));
  
  answered = true;
  state.answers.push({ q, selected: [userAns], isCorrect });
  
  input.disabled = true;
  input.style.borderColor = isCorrect ? 'var(--success)' : 'var(--error)';
  input.style.background = isCorrect ? '#dcfce7' : '#fee2e2';
  
  document.getElementById('btn-check-open').disabled = true;
  
  els.feedback.innerHTML = `
    <p><strong>Ваш ответ:</strong> ${userAns}</p>
    <p><strong>Верный ответ:</strong> ${q.correct.join(' / ')}</p>
    <p class="status ${isCorrect ? 'ok' : 'err'}">
      ${isCorrect ? '✅ Верно!' : '❌ Неверно.'}
    </p>
  `;
  els.feedback.classList.remove('hidden');
  
  els.btnNext.classList.remove('hidden');
  els.btnNext.disabled = false;
}

// === ОБРАБОТКА ВЫБОРА ВАРИАНТА ===
function handleSelect(div, id, q, type) {
  if (answered) return;
  
  if (type === 'radio') {
    // Для одиночного выбора снимаем выделение со всех
    document.querySelectorAll('.option input').forEach(i => {
      i.checked = false;
      i.parentElement.classList.remove('selected');
    });
  }
  
  const input = document.getElementById(id);
  input.checked = !input.checked;
  
  // Подсветка выбранного
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('.option input:checked').forEach(inp => {
    inp.parentElement.classList.add('selected');
  });
  
  if (type === 'radio') {
    // Для одиночного выбора сразу проверяем
    finishAnswer(q);
  } else {
    // Для множественного выбора добавляем кнопку подтверждения
    if (!document.getElementById('btn-confirm')) {
      const btn = document.createElement('button');
      btn.id = 'btn-confirm';
      btn.className = 'btn primary';
      btn.textContent = '✅ Подтвердить выбор';
      btn.onclick = () => finishAnswer(q);
      els.options.appendChild(btn);
    }
  }
}

// === ЗАВЕРШЕНИЕ ОТВЕТА (для обычных вопросов) ===
function finishAnswer(q) {
  answered = true;
  
  const selected = Array.from(els.options.querySelectorAll('input:checked'))
    .map(i => i.value);
  
  const isCorrect = [...q.correct].sort().join(',') === [...selected].sort().join(',');
  
  state.answers.push({ q, selected, isCorrect });
  
  // Блокируем ввод
  els.options.querySelectorAll('input').forEach(i => i.disabled = true);
  els.options.querySelectorAll('.option').forEach(o => {
    o.style.pointerEvents = 'none';
    const inp = o.querySelector('input');
    if (q.correct.includes(inp.value)) {
      o.classList.add('correct');
    } else if (inp.checked) {
      o.classList.add('incorrect');
    }
  });
  
  // Удаляем кнопку подтверждения если есть
  const confirmBtn = document.getElementById('btn-confirm');
  if (confirmBtn) confirmBtn.remove();
  
  // Показываем фидбек
  els.feedback.innerHTML = `
    <p><strong>Ваш ответ:</strong> ${selected.join(', ') || 'Не выбрано'}</p>
    <p><strong>Верный ответ:</strong> ${q.correct.join(', ')}</p>
    <p class="status ${isCorrect ? 'ok' : 'err'}">
      ${isCorrect ? '✅ Верно!' : '❌ Неверно.'}
    </p>
  `;
  els.feedback.classList.remove('hidden');
  
  els.btnNext.classList.remove('hidden');
  els.btnNext.disabled = false;
}

// === ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ НОРМАЛИЗАЦИИ ===
function normalize(str) {
  return str.trim().toLowerCase().replace(/\s+/g, ' ');
}

    let answered = false;
    function handleSelect(div, id, q, type) {
      if (answered) return;
      if (type === 'radio') { document.querySelectorAll('.option input').forEach(i => i.checked = false); }
      document.getElementById(id).checked = !document.getElementById(id).checked;
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      document.querySelectorAll('.option input:checked').forEach(inp => inp.parentElement.classList.add('selected'));
      if (type === 'radio') finishAnswer(q);
      else {
        if (!document.getElementById('btn-confirm')) {
          const btn = document.createElement('button'); btn.id = 'btn-confirm'; btn.className = 'btn primary'; btn.textContent = '✅ Подтвердить выбор';
          btn.onclick = () => finishAnswer(q); els.options.appendChild(btn);
        }
      }
    }

    function finishAnswer(q) {
      answered = true;
      const selected = Array.from(els.options.querySelectorAll('input:checked')).map(i => i.value);
      const isCorrect = [...q.correct].sort().join(',') === [...selected].sort().join(',');
      state.answers.push({ q, selected, isCorrect });
      els.options.querySelectorAll('input').forEach(i => i.disabled = true);
      els.options.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
      if (document.getElementById('btn-confirm')) document.getElementById('btn-confirm').remove();

      els.feedback.innerHTML = `<p><strong>Ваш ответ:</strong> ${selected.join(', ') || 'Не выбрано'}</p>
                                <p><strong>Верный ответ:</strong> ${q.correct.join(', ')}</p>
                                <p class="status ${isCorrect ? 'ok' : 'err'}">${isCorrect ? '✅ Верно!' : '❌ Неверно.'}</p>`;
      els.feedback.classList.remove('hidden');
      document.querySelectorAll('.option').forEach(optDiv => {
        const inp = optDiv.querySelector('input');
        if (q.correct.includes(inp.value)) optDiv.classList.add('correct');
        else if (inp.checked) optDiv.classList.add('incorrect');
      });
      els.btnNext.classList.remove('hidden'); els.btnNext.disabled = false;
    }

    function checkOpenAnswer(q) {
      if (answered) return;
      const input = document.getElementById('open-answer');
      const userAns = input.value.trim();
      if (!userAns) { alert('Введите ответ!'); return; }
      
      const correctArr = q.correct.map(a => normalize(a));
      const isCorrect = correctArr.includes(normalize(userAns));
      answered = true;
      state.answers.push({ q, selected: [userAns], isCorrect });
      input.disabled = true; document.getElementById('btn-check-open').disabled = true;

      els.feedback.innerHTML = `<p><strong>Ваш ответ:</strong> ${userAns}</p>
                                <p><strong>Верный ответ:</strong> ${q.correct.join(' / ')}</p>
                                <p class="status ${isCorrect ? 'ok' : 'err'}">${isCorrect ? '✅ Верно!' : '❌ Неверно.'}</p>`;
      els.feedback.classList.remove('hidden');
      els.btnNext.classList.remove('hidden'); els.btnNext.disabled = false;
    }

    els.btnNext.onclick = () => {
      if (state.currentIdx < state.test.length - 1) { state.currentIdx++; answered = false; renderQuestion(); }
      else finishTest();
    };

    function finishTest() {
      els.score.textContent = state.answers.filter(a => a.isCorrect).length;
      showScreen(els.results);
    }

    function renderReview() {
      els.reviewList.innerHTML = '';
      state.answers.forEach((a, i) => {
        const div = document.createElement('div'); div.className = 'review-item';
        const isOpen = a.q.type === 'open';
        div.innerHTML = `<div class="review-q">${i + 1}. ${a.q.question} ${isOpen ? '<span class="tag type">Открытый</span>' : ''}</div>
                         <div class="review-ans">Ваш ответ: <span class="tag ${a.isCorrect ? 'ok' : 'err'}">${a.selected.join(', ') || '-'}</span></div>
                         <div class="review-ans">Верный ответ: <span class="tag ok">${a.q.correct.join(' / ')}</span></div>
                         ${!a.isCorrect ? '<div style="color:var(--error); font-size:13px; margin-top:4px;">⚠️ Ответ неверный</div>' : ''}`;
        els.reviewList.appendChild(div);
      });
      showScreen(els.review);
    }

    els.btnStart.onclick = startTest;
    els.btnReview.onclick = renderReview;
    els.btnRetake.onclick = startTest;
    els.btnBack.onclick = () => showScreen(els.results);
  </script>
</body>
</html>
