<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Итоговое тестирование</title>
  <style>
    :root { --primary: #2563eb; --primary-hover: #1d4ed8; --success: #16a34a; --error: #dc2626; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-light: #64748b; --border: #e2e8f0; --highlight: #dbeafe; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.5; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { width: 100%; max-width: 800px; background: var(--card); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; }
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    h1, h2 { margin-bottom: 16px; color: var(--text); }
    p { color: var(--text-light); margin-bottom: 20px; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; transition: all 0.2s; }
    .btn.primary { background: var(--primary); color: white; }
    .btn.primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn.secondary { background: var(--border); color: var(--text); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .progress { font-size: 14px; color: var(--text-light); margin-bottom: 10px; text-align: right; }
    .question-box { background: #f1f5f9; padding: 16px; border-radius: 8px; margin-bottom: 20px; font-weight: 500; }
    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .option { padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
    .option:hover { border-color: var(--primary); background: #f8fafc; }
    .option.selected { border-color: var(--primary); background: var(--highlight); font-weight: 500; }
    .option.correct { border-color: var(--success); background: #dcfce7; }
    .option.incorrect { border-color: var(--error); background: #fee2e2; }
    .open-input { width: 100%; padding: 12px; font-size: 16px; border: 2px solid var(--border); border-radius: 8px; transition: border 0.2s; }
    .open-input:focus { border-color: var(--primary); outline: none; }
    .open-input:disabled { background: #f1f5f9; cursor: not-allowed; }
    .feedback { margin: 20px 0; padding: 16px; border-radius: 8px; background: #f8fafc; border-left: 4px solid var(--text-light); }
    .feedback strong { display: block; margin-bottom: 4px; }
    .feedback .status { margin-top: 8px; font-weight: bold; }
    .feedback .status.ok { color: var(--success); }
    .feedback .status.err { color: var(--error); }
    .review-item { border-bottom: 1px solid var(--border); padding: 16px 0; }
    .review-item:last-child { border-bottom: none; }
    .review-q { font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .review-ans { font-size: 14px; margin-bottom: 4px; }
    .tag { padding: 4px 8px; border-radius: 4px; font-weight: 500; font-size: 13px; }
    .tag.ok { background: #dcfce7; color: var(--success); }
    .tag.err { background: #fee2e2; color: var(--error); }
    .tag.type { background: #f1f5f9; color: #64748b; }
    .nav { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    @media (max-width: 600px) { .container { padding: 20px; } }
  </style>
</head>
<body>
  <div class="container">
    <div id="screen-welcome" class="screen active">
      <h1> Итоговое государственное тестирование</h1>
      <p>В каждом тесте случайно выбирается 20 вопросов (выбор варианта + открытые). После ответа сразу отображается верный вариант.</p>
      <button id="btn-start" class="btn primary">▶ Пройти тест</button>
    </div>

    <div id="screen-test" class="screen">
      <div class="progress">Вопрос <span id="current-q">1</span> из 20</div>
      <div id="question-text" class="question-box"></div>
      <div id="options-container" class="options"></div>
      <div id="feedback" class="feedback hidden"></div>
      <div class="nav">
        <button id="btn-next" class="btn primary hidden" disabled>Следующий вопрос →</button>
      </div>
    </div>

    <div id="screen-results" class="screen">
      <h1>📊 Тест завершён</h1>
      <p>Ваш результат: <strong id="score">0</strong> из 20</p>
      <div class="nav">
        <button id="btn-review" class="btn secondary"> Посмотреть разбор</button>
        <button id="btn-retake" class="btn primary"> Пройти заново</button>
      </div>
    </div>

    <div id="screen-review" class="screen">
      <h2>📝 Разбор теста</h2>
      <div id="review-list"></div>
      <div class="nav" style="margin-top:20px;">
        <button id="btn-back" class="btn secondary">← Назад к результатам</button>
      </div>
    </div>
  </div>

  <script>
    // === БАЗА ВОПРОСОВ ===
    // Формат закрытых: { id, question, options: [{id, text}], correct: ['A', 'B'] }
    // Формат открытых: { id, type: 'open', question, correct: ['Ответ 1', 'Ответ 2'] }
   const questionsDB = [
  // ============================================================================
  // ДИСЦИПЛИНА 1: Безопасность ОС и БД (ID: 1-90)
  // ============================================================================
  {id:1,question:"Как в 2026 году наиболее полно определяется безопасность операционной системы в условиях гибридных инфраструктур?",options:[{id:"A",text:"Только антивирусная защита ядра"},{id:"B",text:"Установка патчей раз в месяц"},{id:"C",text:"Комплексная защита: изоляция процессов, контроль целостности, аппаратное доверие, мониторинг поведения"},{id:"D",text:"Только шифрование диска"}],correct:["C"]},
  {id:2,question:"Какие три базовых принципа ИБ остаются фундаментальными для защиты ОС в эпоху AI и облаков?",options:[{id:"A",text:"Шифрование, аутентификация, логирование"},{id:"B",text:"EDR, SIEM, SOAR"},{id:"C",text:"Политики, процедуры, KPI"},{id:"D",text:"Конфиденциальность, целостность, доступность (CIA)"}],correct:["D"]},
  {id:3,question:"Что означает целостность ОС в контексте защиты от rootkit и fileless-атак в 2026?",options:[{id:"A",text:"Регулярное резервное копирование"},{id:"B",text:"Контроль целостности ядра, драйверов и системных вызовов через TPM и измеримую загрузку"},{id:"C",text:"Только антивирусное сканирование"},{id:"D",text:"Запрет на установку стороннего ПО"}],correct:["B"]},
  {id:4,question:"Как обеспечивается безопасная загрузка (Secure Boot) в современных ОС с учётом угроз 2026?",options:[{id:"A",text:"Только пароль на BIOS"},{id:"B",text:"Цепочка доверия от UEFI до ядра с верификацией подписей и измерением компонентов"},{id:"C",text:"Отключение всех внешних устройств"},{id:"D",text:"Использование только отечественного ПО"}],correct:["B"]},
  {id:5,question:"Что подразумевает защита памяти в ОС 2026 для предотвращения эксплойтов типа ROP/JOP?",options:[{id:"A",text:"Только DEP/NX-bit"},{id:"B",text:"ASLR + CFG + CET + изоляция кучи/стека + использование memory-safe языков в критических компонентах"},{id:"C",text:"Увеличение объёма RAM"},{id:"D",text:"Запрет на выполнение кода в пользовательском пространстве"}],correct:["B"]},
  {id:6,question:"Какой механизм ОС критичен для защиты от эскалации привилегий через уязвимости ядра?",options:[{id:"A",text:"Брандмауэр Windows"},{id:"B",text:"Mandatory Access Control (SELinux/AppArmor/SMACK) + sandboxing процессов"},{id:"C",text:"Антивирус в реальном времени"},{id:"D",text:"Регулярная дефрагментация"}],correct:["B"]},
  {id:7,question:"Какова главная цель применения Confidential Computing в ОС 2026?",options:[{id:"A",text:"Ускорение работы приложений"},{id:"B",text:"Защита данных в использовании (in-use) через аппаратные анклавы (SGX/SEV/TDX)"},{id:"C",text:"Снижение потребления энергии"},{id:"D",text:"Упрощение администрирования"}],correct:["B"]},
  {id:8,question:"Какой аспект безопасности ОС обеспечивает устойчивость к компрометации учётных записей с высокими привилегиями?",options:[{id:"A",text:"Сложные пароли"},{id:"B",text:"LAPS + PAM-модули + JIT-привилегии + аудит сессий"},{id:"C",text:"Запрет на удалённый вход"},{id:"D",text:"Только двухфакторная аутентификация"}],correct:["B"]},
  {id:9,question:"В чём ключевой риск использования неподписанных драйверов в ОС 2026?",options:[{id:"A",text:"Замедление загрузки"},{id:"B",text:"Возможность обхода механизмов защиты ядра и установки rootkit"},{id:"C",text:"Несовместимость с облачными сервисами"},{id:"D",text:"Увеличение потребления трафика"}],correct:["B"]},
  {id:10,question:"Какой метод защиты данных на уровне ОС остаётся наиболее эффективным против физического доступа к устройству?",options:[{id:"A",text:"Пароль на вход"},{id:"B",text:"Полнодисковое шифрование (LUKS/BitLocker) с привязкой к TPM и предзагрузочной аутентификацией"},{id:"C",text:"Скрытие разделов"},{id:"D",text:"Только биометрия"}],correct:["B"]},
  {id:11,question:"Как обеспечивается изоляция контейнеров от хост-ОС в 2026?",options:[{id:"A",text:"Только namespaces"},{id:"B",text:"Namespaces + cgroups + seccomp + AppArmor/SELinux + gVisor/Kata Containers для повышенной изоляции"},{id:"C",text:"Запуск от root"},{id:"D",text:"Отключение сети"}],correct:["B"]},
  {id:12,question:"Что является базовым элементом защиты периметра на уровне ОС при исчезновении классического сетевого периметра?",options:[{id:"A",text:"Физическая охрана сервера"},{id:"B",text:"Host-based firewall + eBPF-фильтрация + микросегментация на уровне процессов"},{id:"C",text:"Запрет на использование Wi-Fi"},{id:"D",text:"Только антивирус"}],correct:["B"]},
  {id:13,question:"Какой компонент ОС является ключевым для контроля доступа в Zero Trust-модели на уровне хоста?",options:[{id:"A",text:"Локальный файрвол"},{id:"B",text:"Identity-aware PAM + контекстная авторизация + непрерывная аттестация состояния хоста"},{id:"C",text:"DNS-фильтрация"},{id:"D",text:"Антивирус на шлюзе"}],correct:["B"]},
  {id:14,question:"Какая технология ОС наиболее эффективна для предотвращения утечек через неавторизованные процессы?",options:[{id:"A",text:"Запрет на копирование файлов"},{id:"B",text:"DLP-агент на уровне ядра + контроль буфера обмена + маркировка данных через LSM"},{id:"C",text:"Блокировка USB"},{id:"D",text:"Только шифрование"}],correct:["B"]},
  {id:15,question:"Какая современная угроза наиболее актуальна для ядра ОС в 2026?",options:[{id:"A",text:"Только переполнение буфера"},{id:"B",text:"Supply chain-атаки на компоненты ядра + AI-генерируемые эксплойты + уязвимости в eBPF-программах"},{id:"C",text:"Только фишинг"},{id:"D",text:"Физическая кража"}],correct:["B"]},
  {id:16,question:"Какой механизм ОС обеспечивает верификацию целостности системных файлов и конфигураций?",options:[{id:"A",text:"Регулярное резервное копирование"},{id:"B",text:"IMA/EVM + dm-verity + подписанные обновления через OSTree"},{id:"C",text:"Ручная проверка администратором"},{id:"D",text:"Только контрольные суммы"}],correct:["B"]},
  {id:17,question:"Какая практика повышает устойчивость ОС к zero-day уязвимостям в 2026?",options:[{id:"A",text:"Использование только сертифицированного ПО"},{id:"B",text:"Hardening по CIS/STIG + минимизация attack surface + runtime protection (EDR) + sandboxing"},{id:"C",text:"Только установка патчей"},{id:"D",text:"Ежегодный аудит"}],correct:["B"]},
  {id:18,question:"Какой тип атак на уровне ОС доминирует в ландшафте угроз 2026?",options:[{id:"A",text:"Только брутфорс паролей"},{id:"B",text:"Атаки на цепочки поставок ПО + компрометация CI/CD + эксплуатация уязвимостей в механизмах виртуализации"},{id:"C",text:"Только SQL-инъекции"},{id:"D",text:"Физическое проникновение"}],correct:["B"]},
  {id:19,question:"Какой инструмент критичен для проактивного анализа безопасности на уровне ОС в 2026?",options:[{id:"A",text:"Только антивирусы"},{id:"B",text:"EDR/XDR с телеметрией ядра + поведенческий анализ через eBPF + AI-детекция аномалий"},{id:"C",text:"Ручной анализ логов"},{id:"D",text:"Только сканеры уязвимостей"}],correct:["B"]},
  {id:20,question:"Какой метод наиболее эффективен для предотвращения несанкционированного доступа к сессиям в ОС?",options:[{id:"A",text:"Ежемесячная смена паролей"},{id:"B",text:"Credential Guard + LSA isolation + WebAuthn + адаптивная MFA на уровне PAM"},{id:"C",text:"Запрет на удалённую работу"},{id:"D",text:"Только сложные пароли"}],correct:["B"]},
  {id:21,question:"Какая категория инсайдеров представляет наибольший риск для безопасности ОС в 2026?",options:[{id:"A",text:"Только стажёры"},{id:"B",text:"Учётные записи с избыточными привилегиями + скомпрометированные сервисные аккаунты + злонамеренные администраторы"},{id:"C",text:"Только бывшие сотрудники"},{id:"D",text:"Только недовольные сотрудники"}],correct:["B"]},
  {id:22,question:"Какая мера защиты от вредоносного ПО актуальна в эпоху fileless-атак на уровне ОС?",options:[{id:"A",text:"Только брандмауэры"},{id:"B",text:"AMSI + ETW-мониторинг + поведенческий анализ PowerShell/WMI + блокировка LOLBins"},{id:"C",text:"Запрет на загрузку файлов"},{id:"D",text:"Только сигнатурные антивирусы"}],correct:["B"]},
  {id:23,question:"Какая стратегия предотвращает утечки через системные журналы и телеметрию ОС?",options:[{id:"A",text:"Только отключение логирования"},{id:"B",text:"Централизованный сбор логов с шифрованием + маскирование PII + контроль доступа к audit-подсистеме"},{id:"C",text:"Запрет на облака"},{id:"D",text:"Только блокировка внешних сервисов"}],correct:["B"]},
  {id:24,question:"Какая организационная мера наиболее эффективна для формирования культуры безопасности администрирования ОС?",options:[{id:"A",text:"Штрафы за нарушения"},{id:"B",text:"Непрерывное микрообучение + симуляции атак на ОС + геймификация hardening-практик"},{id:"C",text:"Только подписание NDA"},{id:"D",text:"Ежегодные лекции"}],correct:["B"]},
  {id:25,question:"Какая технология защищает межпроцессное взаимодействие (IPC) в ОС 2026?",options:[{id:"A",text:"Только права доступа к файлам"},{id:"B",text:"Mandatory IPC control + sandboxing + верификация источников сообщений через capabilities"},{id:"C",text:"Только VPN"},{id:"D",text:"Только SSL/TLS"}],correct:["B"]},
  {id:26,question:"Какой шаг входит в современный процесс реагирования на инциденты на уровне ОС?",options:[{id:"A",text:"Только отключение заражённых систем"},{id:"B",text:"Автоматизированная изоляция процесса + сбор форензики через Volatility/eBPF + сохранение памяти для анализа"},{id:"C",text:"Только уведомление руководства"},{id:"D",text:"Только восстановление из бэкапа"}],correct:["B"]},
  {id:27,question:"Какова основная цель требований ФСТЭК к защите ОС в РФ к 2026?",options:[{id:"A",text:"Упрощение требований для малого бизнеса"},{id:"B",text:"Полный запрет на иностранные ОС"},{id:"C",text:"Унификация с международными стандартами любой ценой"},{id:"D",text:"Баланс между суверенитетом, защитой от уязвимостей и поддержкой современных архитектур"}],correct:["D"]},
  {id:28,question:"Кто несёт персональную ответственность за безопасность конфигурации ОС в организации?",options:[{id:"A",text:"Внешние аудиторы"},{id:"B",text:"Только системные администраторы"},{id:"C",text:"Владелец актива + CISO + ответственный за эксплуатацию с чётким разделением обязанностей"},{id:"D",text:"Только CISO"}],correct:["C"]},
  {id:29,question:"Что включает compliance с требованиями по защите ОС в 2026?",options:[{id:"A",text:"Только использование сертифицированных СКЗИ"},{id:"B",text:"Только ежегодный отчёт"},{id:"C",text:"Непрерывный мониторинг конфигураций + автоматизированная проверка hardening + сбор доказательств через SCM"},{id:"D",text:"Только формальное соответствие"}],correct:["C"]},
  {id:30,question:"Как изменилась роль регуляторов в части требований к ОС в 2026?",options:[{id:"A",text:"Только реагирование на инциденты"},{id:"B",text:"Только лицензирование"},{id:"C",text:"Только контроль и штрафы"},{id:"D",text:"Проактивное взаимодействие + риск-ориентированный надзор + регуляторные sandbox для тестирования защищённых ОС"}],correct:["D"]},
  {id:31,question:"Какие KPI используются для оценки системы защиты ОС?",options:[{id:"A",text:"% хостов с актуальным hardening-конфигурациям"},{id:"B",text:"Среднее время устранения уязвимостей критического уровня"},{id:"C",text:"Уровень удовлетворенности клиентов"},{id:"D",text:"Число проведенных совещаний"}],correct:["A","B"]},
  {id:32,question:"Какие меры обеспечивают отказоустойчивость ОС при форс-мажорных обстоятельствах?",options:[{id:"A",text:"Резервное копирование конфигураций и состояний"},{id:"B",text:"Кластеризация + автоматический failover на уровне гипервизора/оркестратора"},{id:"C",text:"Архивное хранение логов"},{id:"D",text:"Экспорт данных в другие форматы"}],correct:["A","B"]},
  {id:33,question:"Какие меры применяются для защиты от угроз внутренней безопасности на уровне ОС?",options:[{id:"A",text:"Разграничение прав через sudo/PAM + mandatory access control"},{id:"B",text:"Аудит действий привилегированных пользователей + UEBA для детекции аномалий"},{id:"C",text:"Использование облачных хранилищ"},{id:"D",text:"Постоянный контроль качества работы оборудования"}],correct:["A","B"]},
  {id:34,question:"Какие современные технологии используют для обеспечения безопасности в IoT-ОС?",options:[{id:"A",text:"Минималистичное ядро + верификация обновлений"},{id:"B",text:"Secure boot + TPM + регулярное OTA-обновление с подписью"},{id:"C",text:"Отключение устройств от интернета"},{id:"D",text:"Уникальные идентификаторы устройств + аттестация состояния"}],correct:["A","B","D"]},
  {id:35,question:"Какие процессы включают эксплуатацию защищённой ОС?",options:[{id:"A",text:"Непрерывный мониторинг целостности и конфигураций"},{id:"B",text:"Автоматизированная реакция на инциденты (SOAR) на уровне хоста"},{id:"C",text:"Установка новых программ без контроля"},{id:"D",text:"Продажа устаревшего оборудования"}],correct:["A","B"]},
  {id:36,question:"Какие компоненты включены в типичную модель многорубежной защиты ОС?",options:[{id:"A",text:"Физическая защита (TPM, secure boot)"},{id:"B",text:"Технические средства (LSM, firewall, EDR)"},{id:"C",text:"Организационные меры (политики, аудит, разделение обязанностей)"},{id:"D",text:"Обучение пользователей правилам этикета"}],correct:["A","B","C"]},
  {id:37,question:"Какие меры принимаются для защиты данных в процессе их передачи на уровне ОС?",options:[{id:"A",text:"Шифрование на уровне socket/TLS"},{id:"B",text:"VPN на уровне ядра (WireGuard/IPsec) + контроль маршрутизации"},{id:"C",text:"Использование публичных каналов связи без шифрования"},{id:"D",text:"Отправка данных через почтовые сервисы"}],correct:["A","B"]},
  {id:38,question:"Какие угрозы могут исходить изнутри организации на уровне ОС?",options:[{id:"A",text:"Злоупотребление правами root/sudo"},{id:"B",text:"Несанкционированный доступ к /etc/shadow, ключам, журналам"},{id:"C",text:"Конкуренция между отделами"},{id:"D",text:"Непродуманная политика увольнений"}],correct:["A","B"]},
  {id:39,question:"Какие преимущества даёт разработка политик безопасности ОС?",options:[{id:"A",text:"Повышение осведомлённости администраторов"},{id:"B",text:"Соответствие требованиям ФСТЭК/ФСБ"},{id:"C",text:"Экономия на закупке оборудования"},{id:"D",text:"Снижение количества инцидентов за счёт стандартизации hardening"}],correct:["A","B","D"]},
  {id:40,question:"Какие угрозы безопасности ОС особенно актуальны для облачных виртуальных машин?",options:[{id:"A",text:"Атаки на гипервизор (VM escape)"},{id:"B",text:"Misconfiguration security groups и IAM-ролей ВМ"},{id:"C",text:"Уязвимости в cloud-init и metadata-сервисах"},{id:"D",text:"Проблемы с электропитанием"}],correct:["A","B","C"]},
  {id:41,question:"Какие данные на уровне ОС подлежат обязательной защите в соответствии с законодательством?",options:[{id:"A",text:"Персональные данные в логах и журналах"},{id:"B",text:"Ключи шифрования и сертификаты в хранилищах ОС"},{id:"C",text:"Данные медицинских обследований в файловых системах"},{id:"D",text:"История посещений сайта организацией"}],correct:["A","B","C"]},
  {id:42,question:"Какие меры предосторожности принимаются для защиты конфиденциальной информации на уровне ОС?",options:[{id:"A",text:"Ограничение доступа через DAC/MAC"},{id:"B",text:"Мониторинг доступа к чувствительным файлам через auditd/ETW"},{id:"C",text:"Удаленное уничтожение данных"},{id:"D",text:"Разделение обязанностей (sudoers, RBAC)"}],correct:["A","B","D"]},
  {id:43,question:"Какие процессы необходимы для поддержания безопасности ОС?",options:[{id:"A",text:"Регулярное обновление ядра и пакетов"},{id:"B",text:"Проведение аудитов конфигураций (CIS benchmarks)"},{id:"C",text:"Резервное копирование критических конфигураций и состояний"},{id:"D",text:"Ежегодное планирование бюджета на ИТ"}],correct:["A","B","C"]},
  {id:44,question:"Какие проблемы могут возникнуть при несоблюдении правил безопасности ОС?",options:[{id:"A",text:"Потеря данных из-за ransomware"},{id:"B",text:"Нецелевое использование привилегий для эксфильтрации"},{id:"C",text:"Повреждение оборудования"},{id:"D",text:"Увеличение затрат на восстановление после инцидентов"}],correct:["A","B","D"]},
  {id:45,question:"Какие действия предпринимает служба безопасности при инциденте на уровне ОС?",options:[{id:"A",text:"Сбор форензики: память, диски, журналы"},{id:"B",text:"Составление отчёта с цепочкой атаки (kill chain)"},{id:"C",text:"Сообщение руководству и регулятору при необходимости"},{id:"D",text:"Проведение тренингов для сотрудников"}],correct:["A","B","C"]},
  {id:46,question:"Какие типы политик безопасности могут существовать для ОС?",options:[{id:"A",text:"Политика управления привилегиями (sudo/PAM)"},{id:"B",text:"Политика обновления и патчинга"},{id:"C",text:"Политика использования контейнеров и sandboxing"},{id:"D",text:"Политика уборки рабочего места"}],correct:["A","B","C"]},
  {id:47,question:"Какие виды внутренних угроз актуальны для ОС?",options:[{id:"A",text:"Несанкционированный доступ к /root, /etc"},{id:"B",text:"Злоупотребление правами для установки backdoor"},{id:"C",text:"Отключение электроэнергии"},{id:"D",text:"Природные катастрофы"}],correct:["A","B"]},
  {id:48,question:"Какие меры применяются для защиты ОС от внешнего вмешательства?",options:[{id:"A",text:"Host-based firewall (nftables/iptables/Windows Firewall)"},{id:"B",text:"EDR с детекцией аномального поведения процессов"},{id:"C",text:"Установка датчиков движения"},{id:"D",text:"Перевод данных на бумажные носители"}],correct:["A","B"]},
  {id:49,question:"Какие средства несанкционированного доступа к видеоинформации могут использовать злоумышленники через ОС?",options:[{id:"A",text:"Вредоносное ПО для доступа к камере"},{id:"B",text:"Компрометация сервисов видеонаблюдения на хосте"},{id:"C",text:"Гороскоп"},{id:"D",text:"Карточная игра"}],correct:["A","B"]},
  {id:50,question:"Какие показатели используются для оценки эффективности защиты ОС?",options:[{id:"A",text:"Время обнаружения аномалий в ядре/процессах"},{id:"B",text:"Частота инцидентов, связанных с компрометацией хоста"},{id:"C",text:"Готовность сотрудников к производственным соревнованиям"},{id:"D",text:"Количество наград компании"}],correct:["A","B"]},
  {id:51,question:"Установите соответствие:\n\n1. Киберустойчивость (Resilience)\n2. Киберугроза (AI-driven)\n3. Кибератака\n4. Вредоносный код (Polymorphic)\n\nА) Способность системы восстанавливаться и функционировать при атаках\nБ) Угроза, использующая нейросети для генерации фишинга или кода\nВ) Реализованное действие по нарушению конфиденциальности, целостности или доступности\nГ) Код, автоматически изменяющий свою структуру для обхода сигнатур",options:[{id:"A",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:52,question:"Установите соответствие:\n\n1. Стратегия ИБ\n2. Реестр рисков\n3. Киберинцидент\n4. Модель угроз (Threat Modeling)\n\nА) Документ, определяющий цели защиты и архитектуру безопасности\nБ) Динамический список рисков с оценкой вероятности и ущерба\nВ) Событие, нарушающее политики безопасности или работу сервисов\nГ) Процесс выявления потенциальных векторов атак на этапе проектирования",options:[{id:"A",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:53,question:"Установите соответствие:\n\n1. Доступность (Availability)\n2. Целостность (Integrity)\n3. Конфиденциальность (Confidentiality)\n4. Суверенитет данных\n\nА) Гарантия точности и неизменности данных в ОС и БД\nБ) Гарантия доступа к сервисам 24/7 (SLA)\nВ) Защита от несанкционированного доступа (в т.ч. AI-анализ)\nГ) Требование хранения данных в юрисдикции государства (152-ФЗ)",options:[{id:"A",text:"1-Б, 2-А, 3-В, 4-Г"},{id:"B",text:"1-А, 2-Б, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:54,question:"Установите соответствие:\n\n1. EDR/XDR (Kernel level)\n2. PQC (Post-Quantum Crypto)\n3. NGFW (Next-Gen)\n4. Immutable Backup\n\nА) Мониторинг процессов на уровне ядра ОС для выявления угроз\nБ) Алгоритмы шифрования, устойчивые к квантовым вычислениям\nВ) Межсетевой экран с анализом трафика L7 и поведенческим анализом\nГ) Резервная копия, защищенная от изменения (WORM)",options:[{id:"A",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:55,question:"Установите соответствие:\n\n1. Zero Trust\n2. DevSecOps\n3. Регуляторные требования (ФСТЭК/ЦБ)\n4. Киберстрахование\n\nА) Архитектура «Никому не доверяй, проверяй каждый запрос»\nБ) Встраивание проверок безопасности в CI/CD пайплайн\nВ) Обязательные стандарты (КЗС, СЗИ) для банков\nГ) Финансовая защита от убытков после инцидента",options:[{id:"A",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:56,question:"Установите соответствие:\n\n1. Supply Chain Attack\n2. Климатические риски ЦОД\n3. Deepfake-инжиниринг\n4. IoT-угрозы\n\nА) Компрометация через обновления ПО сторонних вендоров\nБ) Риск отключения ЦОД из-за экстремальных погодных явлений\nВ) Использование синтезированного голоса/видео для обмана\nГ) Взлом периферийных устройств (камеры, датчики) в сети",options:[{id:"A",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:57,question:"Установите соответствие:\n\n1. DDoS (L7)\n2. Ransomware (Double Extortion)\n3. API Abuse\n4. Shadow IT\n\nА) Атака на уровень приложений для исчерпания ресурсов\nБ) Шифрование данных + угроза публикации украденного\nВ) Эксплуатация уязвимостей в интерфейсах интеграции\nГ) Использование неутвержденных облачных сервисов сотрудниками",options:[{id:"A",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:58,question:"Установите соответствие:\n\n1. Тактические угрозы\n2. Стратегические угрозы\n3. Операционные риски\n4. Репутационные риски\n\nА) Угрозы бизнес-модели в долгосрочной перспективе\nБ) Конкретные техники атак (TTPs) здесь и сейчас\nВ) Риски сбоев в ежедневных процессах и ОС\nГ) Потеря доверия клиентов и партнеров",options:[{id:"A",text:"1-Б, 2-А, 3-В, 4-Г"},{id:"B",text:"1-А, 2-Б, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:59,question:"Установите соответствие:\n\n1. Fileless Malware\n2. Crypto Drainer\n3. Ботнет\n4. Zero-day Exploit\n\nА) Код, исполняемый в оперативной памяти без записи на диск\nБ) Сеть зараженных устройств для атак\nВ) Атака на уязвимость, о которой вендор еще не знает\nГ) Скрипт для хищения средств из веб3-кошельков",options:[{id:"A",text:"1-А, 2-Г, 3-Б, 4-В"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:60,question:"Установите соответствие:\n\n1. Аутентификация\n2. Авторизация\n3. Идентификация\n4. Adaptive Access\n\nА) Присвоение уникального ID (Login)\nБ) Динамический запрос MFA в зависимости от риска\nВ) Подтверждение личности (пароль, биометрия)\nГ) Проверка прав на выполнение действия",options:[{id:"A",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"B",text:"1-А, 2-Б, 3-Г, 4-В"},{id:"C",text:"1-Б, 2-А, 3-В, 4-Г"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:61,question:"Установите соответствие:\n\n1. Микросервисы\n2. API Gateway\n3. Контейнеры (K8s)\n4. Гибридное облако\n\nА) Единая точка входа, аутентификации и лимитирования API\nБ) Инфраструктура, сочетающая Private и Public Cloud\nВ) Изолированная среда исполнения приложений\nГ) Декомпозиция монолита на независимые сервисы",options:[{id:"A",text:"1-Г, 2-А, 3-В, 4-Б"},{id:"B",text:"1-А, 2-Б, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Б, 2-В, 3-Г, 4-А"}],correct:["A"]},
  {id:62,question:"Установите соответствие:\n\n1. Real-time Processing\n2. Night Batch\n3. Edge Computing\n4. DLT (Distributed Ledger)\n\nА) Мгновенные платежи (SEPA Instant, СПФС)\nБ) Обработка данных на периферийных устройствах\nВ) Пакетная обработка транзакций в конце дня\nГ) Синхронизация данных без центрального арбитра",options:[{id:"A",text:"1-А, 2-В, 3-Б, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:63,question:"Установите соответствие:\n\n1. SIEM\n2. SOAR\n3. Logging\n4. UEBA\n\nА) Оркестрация и автоматизация реагирования на инциденты\nБ) Анализ аномалий в поведении пользователей (ML)\nВ) Агрегация и корреляция логов безопасности\nГ) Запись событий для аудита и форензики",options:[{id:"A",text:"1-В, 2-А, 3-Г, 4-Б"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-Б, 2-В, 3-А, 4-Г"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:64,question:"Установите соответствие:\n\n1. Узел (Node)\n2. Доменное имя\n3. IPv6 адрес\n4. Порт сервиса\n\nА) Человеко-читаемый адрес ресурса (DNS)\nБ) Логический номер сетевого сервиса (TCP/UDP)\nВ) Физическое или виртуальное устройство в сети\nГ) 128-битный адрес нового поколения",options:[{id:"A",text:"1-В, 2-А, 3-Г, 4-Б"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-Б, 2-В, 3-А, 4-Г"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:65,question:"Установите соответствие:\n\n1. SD-WAN\n2. Маршрутизатор\n3. L3 Switch\n4. Load Balancer\n\nА) Распределение входящего трафика между серверами\nБ) Программное управление глобальной сетью\nВ) Маршрутизация пакетов между разными сетями\nГ) Коммутация и маршрутизация внутри сегмента",options:[{id:"A",text:"1-Б, 2-В, 3-Г, 4-А"},{id:"B",text:"1-В, 2-А, 3-Г, 4-Б"},{id:"C",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:66,question:"Последовательность жизненного цикла ПО (DevSecOps):\n\nА) Тестирование безопасности (SAST/DAST)\nБ) Проектирование архитектуры (Threat Model)\nВ) Мониторинг в продуктиве (RASP)\nГ) Сбор требований (Security Req)\nД) Вывод из эксплуатации (Decommissioning)",options:[{id:"A",text:"Г, Б, А, В, Д"},{id:"B",text:"Б, Г, А, В, Д"},{id:"C",text:"А, В, Б, Г, Д"},{id:"D",text:"В, Г, Б, А, Д"}],correct:["A"]},
  {id:67,question:"Последовательность реагирования на инцидент (NIST SP 800-61):\n\nА) Анализ и форензика\nБ) Сдерживание (Containment)\nВ) Восстановление (Recovery)\nГ) Обнаружение (Detection)\nД) Извлечение уроков (Lessons Learned)",options:[{id:"A",text:"Г, Б, А, В, Д"},{id:"B",text:"Б, Г, А, В, Д"},{id:"C",text:"А, В, Б, Г, Д"},{id:"D",text:"В, Г, Б, А, Д"}],correct:["A"]},
  {id:68,question:"Этапы разработки политики ИБ:\n\nА) Утверждение Советом Директоров\nБ) Оценка зрелости (Gap Analysis)\nВ) Написание текста\nГ) Аудит и актуализация\nД) Определение бизнес-целей",options:[{id:"A",text:"Д, Б, В, А, Г"},{id:"B",text:"Б, Д, В, А, Г"},{id:"C",text:"А, В, Б, Г, Д"},{id:"D",text:"В, Г, Б, А, Д"}],correct:["A"]},
  {id:69,question:"Этапы управления доступом (IAM):\n\nА) Предоставление прав (Provisioning)\nБ) Идентификация\nВ) Аутентификация\nГ) Отзыв прав (Deprovisioning)",options:[{id:"A",text:"Б, В, А, Г"},{id:"B",text:"В, Б, А, Г"},{id:"C",text:"А, Б, В, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:70,question:"Стратегия резервного копирования 3-2-1:\n\nА) Выбор типа (Full/Inc)\nБ) Копирование на отдельный носитель\nВ) Копия вне площадки (Offsite)\nГ) Создание двух локальных копий",options:[{id:"A",text:"А, Г, Б, В"},{id:"B",text:"Г, А, Б, В"},{id:"C",text:"Б, В, А, Г"},{id:"D",text:"В, Г, Б, А"}],correct:["A"]},

  {id:72,question:"Этапы Pentest (тест на проникновение):\n\nА) Отчет и рекомендации\nБ) Разведка (Recon)\nВ) Эксплуатация (Exploitation)\nГ) Сканирование (Scanning)",options:[{id:"A",text:"Б, Г, В, А"},{id:"B",text:"Г, Б, В, А"},{id:"C",text:"А, В, Г, Б"},{id:"D",text:"В, Г, Б, А"}],correct:["A"]},
  {id:73,question:"Внедрение Zero Trust:\n\nА) Строгая аутентификация (MFA)\nБ) Картирование потоков данных\nВ) Микросегментация сети\nГ) Непрерывный мониторинг",options:[{id:"A",text:"Б, А, В, Г"},{id:"B",text:"А, Б, В, Г"},{id:"C",text:"В, Г, Б, А"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},

  {id:135,question:"Какие критерии качества информации важны для информационного менеджмента?",options:[{id:"A",text:"Актуальность"},{id:"B",text:"Точность"},{id:"C",text:"Достоверность"},{id:"D",text:"Форматирование"}],correct:["A","C"]},
  {id:136,question:"Какие виды технической документации существуют?",options:[{id:"A",text:"Пользовательская"},{id:"B",text:"Финансовая"},{id:"C",text:"Системная"},{id:"D",text:"Проектная"}],correct:["A","C"]},
  {id:137,question:"Какие ключевые этапы входят в стратегическое планирование ИС?",options:[{id:"A",text:"Разработка стратегии"},{id:"B",text:"Распределение ресурсов"},{id:"C",text:"Формулирование миссии"},{id:"D",text:"Контроль реализации"}],correct:["A","C"]},
  {id:138,question:"Какие технологии широко применяются в информационном менеджменте?",options:[{id:"A",text:"Системы управления проектами"},{id:"B",text:"Базы данных"},{id:"C",text:"Информационные порталы"},{id:"D",text:"Социальные сети"}],correct:["B","C"]},
  {id:139,question:"Какие преимущества приносит моделирование бизнес-процессов?",options:[{id:"A",text:"Оптимизация работы"},{id:"B",text:"Сокращение затрат"},{id:"C",text:"Улучшение коммуникаций"},{id:"D",text:"Повышение бюрократии"}],correct:["A","B"]},
  {id:140,question:"Какие принципы важны при разработке технической документации?",options:[{id:"A",text:"Ясность"},{id:"B",text:"Структурированность"},{id:"C",text:"Логичность"},{id:"D",text:"Сложность"}],correct:["A","B"]},
  {id:141,question:"Определите последовательность процесса планирования работ по определению первоначальных требований заказчика к ИС:\n\nА) Проверка документированных требований с заинтересованными сторонами для обеспечения точности\nБ) Проведите интервью с заинтересованными сторонами, чтобы собрать их первоначальные требования\nВ) Определите ключевых заинтересованных сторон, участвующих в проекте информационной системы\nГ) Задокументируйте собранные требования в ясной и краткой форме",options:[{id:"A",text:"В, Б, Г, А"},{id:"B",text:"Б, В, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:142,question:"Определите последовательность процесса определения требований заказчика к ИС:\n\nА) Расставьте приоритеты и классифицируйте собранные требования в зависимости от их важности и осуществимости\nБ) Представьте классифицированные требования заинтересованным сторонам для проверки и обратной связи\nВ) Проведите семинары или мозговые штурмы с заинтересованными сторонами, чтобы выявить их первоначальные требования\nГ) Организуйте дискуссии и побудите заинтересованные стороны поделиться своими идеями и ожиданиями",options:[{id:"A",text:"В, Г, А, Б"},{id:"B",text:"Б, В, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:143,question:"Определите последовательность процесса планирования работ по определению первоначальных требований заказчика к ИС:\n\nА) Создайте предлагаемую карту процесса, включающую собранные требования для рассмотрения и обратной связи\nБ) Анализ существующих бизнес-процессов и рабочих процессов, связанных с информационной системой\nВ) Определите области, где улучшения или автоматизация могут повысить эффективность\nГ) Обсудите потенциальные изменения процесса с соответствующими заинтересованными сторонами, чтобы собрать их требования",options:[{id:"A",text:"Б, В, Г, А"},{id:"B",text:"В, Б, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:144,question:"Определите последовательность задокументирования ограничений и болевых точек существующей информационной системы:\n\nА) Определить и задокументировать ограничения и болевые точки существующей информационной системы\nБ) Сотрудничайте с технической командой для изучения потенциальных решений, соответствующих выявленным требованиям\nВ) Представьте предлагаемые решения заинтересованным сторонам для их участия и одобрения\nГ) Взаимодействуйте с конечными пользователями, чтобы понять их конкретные требования и болевые точки",options:[{id:"A",text:"А, Г, Б, В"},{id:"B",text:"Б, А, В, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:145,question:"Упорядочьте процесс контроля выполнения работ по проекту:\n\nА) Регулярно анализировать процесс реализации мер по снижению рисков\nБ) Контролировать и документировать проблемы проекта по мере их возникновения\nВ) Разработать стратегии снижения рисков и планы действий для каждого выявленного риска\nГ) Назначать ответственных лиц для решения проблем и контролировать ход их решения",options:[{id:"A",text:"В, А, Б, Г"},{id:"B",text:"Б, В, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:146,question:"Расположите в правильной последовательности процесс разработки регламентных документов проекта:\n\nА) Провести анализ пробелов, чтобы определить области, где необходимы новые или обновленные документы\nБ) Проконсультируйтесь с заинтересованными сторонами и профильными экспертами для сбора информации\nВ) Рассмотрение существующих нормативных документов по аналогичным проектам\nГ) Разработать предварительную схему нормативных документов",options:[{id:"A",text:"В, А, Г, Б"},{id:"B",text:"Б, В, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:147,question:"Упорядочьте процесс оценки корректирующих мероприятий по проекту:\n\nА) Смягчение выявленных рисков\nБ) Определить риски проекта\nВ) Решение проблем по проекту\nГ) Мониторинг корректирующих мероприятий по снижению рисков",options:[{id:"A",text:"Б, А, Г, В"},{id:"B",text:"В, Б, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:148,question:"Упорядочите уровни иерархии ролей специалистов IT-компаний, работающих над реализацией проекта (в порядке возрастания):\n\nА) Middle\nБ) Leader Team\nВ) Junior\nГ) Senior",options:[{id:"A",text:"В, А, Г, Б"},{id:"B",text:"Б, В, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:149,question:"Определите последовательность процессе проведения исследования новых рынков:\n\nА) Обсудите и сузьте тему исследования, исходя из интересов членов группы и имеющихся ресурсов\nБ) Завершение темы и целей исследования\nВ) Проведите мозговой штурм по потенциальным направлениям исследований\nГ) Проведите онлайн-поиск и используйте инструменты для совместной работы для сбора соответствующей информации",options:[{id:"A",text:"В, Г, А, Б"},{id:"B",text:"Б, В, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:150,question:"Определите последовательность этапов составления плана исследования новых рынков ИТ-продуктов:\n\nА) Разделите исследование на управляемые разделы и распределите обязанности\nБ) Обсудить и окончательно утвердить методологию исследования и методы сбора данных, которые будут использоваться\nВ) Создайте комплексный план исследования, включая подробный план и распределение ресурсов\nГ) Используйте платформы для совместной работы, чтобы создать общий график и установить сроки для каждой задачи",options:[{id:"A",text:"А, Г, Б, В"},{id:"B",text:"Б, В, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:151,question:"Определите последовательность этапов сбора данных:\n\nА) Используйте инструменты онлайн-опросов или проводите интервью удаленно для сбора первичных данных\nБ) Совместная работа с использованием облачных платформ для безопасного сбора и хранения данных исследований\nВ) Регулярное обновление и отслеживание хода сбора данных, обеспечивая качество и надежность данных\nГ) Определить соответствующие источники, базы данных и цифровые библиотеки для сбора данных",options:[{id:"A",text:"Г, А, Б, В"},{id:"B",text:"Б, В, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:152,question:"Определите последовательность оптимизации методики управления ИТ-проектами:\n\nА) Оценить возможность внедрения новых проектов\nБ) Выявите лишние или неэффективные продукты для возможного устранения\nВ) Постоянно отслеживайте и анализируйте портфель ИТ-продуктов для обеспечения постоянной оптимизации\nГ) Изучите возможности консолидации или интеграции продуктов в один проект",options:[{id:"A",text:"Б, Г, А, В"},{id:"B",text:"В, Б, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:153,question:"Расположите в правильной последовательности процесс разработки нормативных документов проекта:\n\nА) Рассмотрите и отредактируйте проект, чтобы устранить любые пробелы или неясности\nБ) Напишите первоначальный проект каждого нормативного документа, обеспечив ясность и последовательность\nВ) Обеспечить соблюдение применимых нормативных стандартов и руководств\nГ) При необходимости включите соответствующие ссылки, цитаты и приложения",options:[{id:"A",text:"Б, Г, А, В"},{id:"B",text:"В, Б, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:154,question:"Расположите в правильной последовательности процесс внедрения и сопровождения проектной документации ИТ-проекта:\n\nА) Установить порядок распространения утвержденных нормативных документов\nБ) Контролировать соблюдение нормативных документов на протяжении всего жизненного цикла проекта\nВ) Проводить учебные занятия, чтобы заинтересованные стороны понимали требования\nГ) Разработать систему отслеживания и управления обновлениями и исправлениями",options:[{id:"A",text:"А, В, Г, Б"},{id:"B",text:"Б, В, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:155,question:"Определите последовательность процесса анализа источников информации необходимой для реализации ИС:\n\nА) Организовать встречу с заинтересованными сторонами для обсуждения и уточнения выявленных требований\nБ) Создайте анкету или опрос для сбора требований клиентов к информационной системе\nВ) Распространите анкету среди соответствующих заинтересованных сторон и соберите их ответы\nГ) Проанализируйте собранные данные из анкеты, чтобы определить общие темы и требования",options:[{id:"A",text:"Б, В, Г, А"},{id:"B",text:"В, Б, А, Г"},{id:"C",text:"А, В, Б, Г"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:156,question:"Соотнесите понятие инструментов и методов моделирования бизнес-процессов с их содержанием:\n\n1. Диаграмма действий\n2. Бизнес-процесс\n3. BPMN\n4. Диаграмма сотрудничества\n\nА. стандартизированная графическая нотация для моделирования бизнес-процессов\nБ. Визуальное представление бизнес-процесса, иллюстрирующее последовательность действий\nВ. Визуальное представление взаимодействия между различными участниками или компонентами бизнес-процесса\nГ. Ряд взаимосвязанных задач или действий, предпринимаемых для достижения конкретной цели",options:[{id:"A",text:"1-Б, 2-Г, 3-А, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:157,question:"Сопоставьте определения этапов управления проектами с их понятиями:\n\n1 этап Инициирование проекта\n2 этап Планирование проекта\n3 этап Управление содержанием\n4 этап Управление качеством\n\nА. Практика определения и контроля содержания проекта, обеспечивающая четкое определение результатов и целей проекта\nБ. Определяются и документируются цели, объем и осуществимость проекта\nВ. Процесс планирования, реализации и мониторинга деятельности проекта, направленный на обеспечение соответствия результатов проекта определенным стандартам\nГ. Процесс определения мероприятий проекта, сроков, ресурсов и контрольных точек для достижения целей проекта",options:[{id:"A",text:"1-Б, 2-Г, 3-А, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:158,question:"Соотнесите определения сбор, систематизации и анализа информации в процессе реализации проекта с их понятиями:\n\n1. Внедрение\n2. Методы сбора данных\n3. Аналитические основы\n4. Управление информацией\n\nА. Выполнение и реализация ИТ-проекта на основе собранной и проанализированной информации\nБ. структуры или модели, используемые для критического анализа информации\nВ. общий процесс сбора, систематизации, анализа и эффективного использования информации в ИТ-проектах\nГ. методы и инструменты, используемые для сбора информации, такие как опросы, интервью, наблюдения, анализ документов и интеллектуальный анализ данных",options:[{id:"A",text:"1-А, 2-Г, 3-Б, 4-В"},{id:"B",text:"1-Б, 2-А, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:159,question:"Соотнесите понятие инструментов и методов моделирования бизнес-процессов с их содержанием:\n\n1. Точка принятия решения\n2. Событие\n3. Шлюзы\n4. Ключевой показатель эффективности (KPI)\n\nА. Конкретный момент в бизнес-процессе, когда необходимо принять решение\nБ. Элементы моделирования в BPMN, представляющие точки процесса, где принимаются решения\nВ. Количественный показатель, используемый для оценки успеха или производительности бизнес-процесса\nГ. конкретное событие, которое запускает бизнес-процесс или влияет на него",options:[{id:"A",text:"1-А, 2-Г, 3-Б, 4-В"},{id:"B",text:"1-Б, 2-А, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:160,question:"Соотнесите понятия моделирование бизнес-процессов с их содержанием:\n\n1. Моделирование процесса\n2. Диаграмма «дорожки»\n3. Подпроцесс\n4. Системная интеграция\n\nА. Создание графических представлений или диаграмм для иллюстрации этапов и хода бизнес-процесса\nБ. Процесс подключения и интеграции различного программного обеспечения в бизнес-процесс для оптимизации операций\nВ. Меньший, автономный процесс в рамках более крупного бизнес-процесса\nГ. Вариант диаграммы процесса, которая распределяет действия и участников по горизонтальным или вертикальным полосам",options:[{id:"A",text:"1-А, 2-Г, 3-В, 4-Б"},{id:"B",text:"1-Б, 2-А, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:161,question:"Установите соответствие между понятиями развитие персонала в проектной деятельности с их характеристиками:\n\n1) Competence Group Manager (CGM)\n2) Таймлайн (Timeline)\n3) Грейдинг (Gradeing)\n4) Training and development (T&D)\n\nА. Распределение должностей, имеющих примерно одинаковую важность для компании, при этом функционал их может быть совершенно разным\nБ. Менеджер, отвечающий за развитие конкретной компетенции\nВ. Подразделение компании, специально выделенное для обучения персонала\nГ. Временная шкала, визуальное представление каких-либо событий, явлений в хронологическом порядке",options:[{id:"A",text:"1-Б, 2-Г, 3-А, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:162,question:"Установите соответствие основных функций управления командой с их спецификой деятельности:\n\n1. Формирование группы\n2. Использование членов группы\n3. Вознаграждение членов группы\n4. Развитие сотрудников в рамках группы\n\nА. Способ активизации потенциала членов группы путем создания и развития организационных программ стимулирования эффективности, способствующих достижению бизнес-целей\nБ. Совокупность действий, направленных на укомплектованность рабочей группы квалифицированными, мотивированными и лояльными работниками\nВ. Целеориентированный процесс преобразования позиции организации путем достижения компромисса между личными потребностями члена группы в саморазвитии и интересов организации\nГ. Совокупность действий, направленных на создание условий для реализации каждым членом группы своих потенциальных возможностей (способностей)",options:[{id:"A",text:"1-Б, 2-Г, 3-А, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:163,question:"Установите соответствие общесистемных принципов управления работой в процессе реализации проекта с их описанием:\n\n1. Функциональность\n2. Иерархичность\n3. Организованность\n4. Интегративность\n\nА. Система может быть рассмотрена как элемент системы более высокого порядка, а каждый ее элемент, в свою очередь, является системой.\nБ. Элементы (части) системы имеют связи друг с другом, взаимосвязаны и взаимодействуют определенным образом, организованы в пространстве и времени\nВ. Принципиальная несводимость свойств системы к сумме свойств составляющих ее элементов\nГ. Создание системы обусловлено объективной необходимостью, она существует для выполнения определенной функции в среде",options:[{id:"A",text:"1-Г, 2-А, 3-Б, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:164,question:"Соотнесите понятия контроля выполнения работ по проекту с их содержанием:\n\n1. Контроль рисков\n2. Контроль изменений\n3. Контроль коммуникации\n4. Контроль ресурсов\n\nА. Оценка запросов на изменения, определение их влияния и внедрение утвержденных изменений\nБ. Управление информационным потоками, решение любых коммуникационных проблем\nВ. Выявление, оценка и управление негативными последствиями на протяжении всего жизненного цикла проекта с целью минимизировать их потенциальное негативное воздействие\nГ. Управление и оптимизацию ресурсов проекта, включая персонал, оборудование и материалы",options:[{id:"A",text:"1-В, 2-А, 3-Б, 4-Г"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:165,question:"Сопоставьте уровни оценки эффективности обучения и развития менеджеров ИТ-проектов Д. Кирпатрика с содержанием оценки:\n\n1. Reaction\n2. Leaning\n3. Behavior\n4. Results\n\nА. Изменение установок, улучшение знаний и совершенствование навыков участников\nБ. Влияние на результаты бизнеса\nВ. Реакция обучаемых\nГ. Изменение поведения участников на рабочем месте",options:[{id:"A",text:"1-В, 2-А, 3-Г, 4-Б"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:166,question:"Соотнесите понятия контроля выполнения работ по проекту с их содержанием:\n\n1. Контроль выполнения проекта\n2. Контроль содержания\n3. Контроль расписания\n4. Контроль затрат\n\nА. Управление и контроль изменений содержания проекта, включая дополнения целей или требований проекта\nБ. Процесс мониторинга и управления ходом проекта\nВ. Мониторинг и управление бюджетом проекта\nГ. Отслеживание и управление графиком проекта",options:[{id:"A",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:167,question:"Соотнесите понятия управление жизненным циклом ИТ-инфраструктуры с их содержанием:\n\n1. Виртуализация\n2. Централизованное управление\n3. Облачные технологии\n4. Стандартизация\n\nА. Технологии, позволяющие предоставлять доступ к вычислительным ресурсам и сервисам через интернет\nБ. Технология, позволяющая создавать виртуальные экземпляры аппаратных ресурсов\nВ. Процесс установления общих стандартов и правил для компонентов ИТ-инфраструктуры с целью повышения совместимости и упрощения управления\nГ. Подход к управлению ИТ-инфраструктурой, при котором все ресурсы контролируются и управляются из центрального места",options:[{id:"A",text:"1-Б, 2-Г, 3-А, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:168,question:"Установите соответствие определений с понятиями программного обеспечения, применяемое при ведении проекта:\n\n1. Программное обеспечение для управления проектами\n2. Контроль версий\n3. Отслеживание ошибок\n4. Интегрированная среда разработки (IDE)\n\nА. Программное обеспечение, используемое для записи, составления отчетов и отслеживания дефектов программного обеспечения или проблем\nБ. Программное приложение, предоставляющее полный набор инструментов и функций для написания, редактирования, отладки и тестирования кода в единой среде разработки\nВ. Практика управления и отслеживания изменений в программном коде\nГ. Инструменты, используемые для планирования, организации и отслеживания деятельности проекта",options:[{id:"A",text:"1-Г, 2-В, 3-А, 4-Б"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:169,question:"Соотнесите понятия управление жизненным циклом ИТ-инфраструктуры с их содержанием:\n\n1. Управление жизненным циклом ИТ-инфраструктуры\n2. Планирование жизненного цикла\n3. Развертывание\n4. Управление\n\nА. Процесс определения целей, потребностей и требований к ИТ-инфраструктуре предприятия на основе бизнес-стратегии и ожиданий пользователей\nБ. Этап жизненного цикла, включающий приобретение, установку и настройку новых компонентов ИТ-инфраструктуры\nВ. Стратегический подход к планированию, развертыванию, управлению и обновлению всех компонентов ИТ-инфраструктуры организации\nГ. Процесс контроля, мониторинга и обслуживания ИТ-инфраструктуры предприятия, включая резервное копирование, обновления и обеспечение безопасности",options:[{id:"A",text:"1-В, 2-А, 3-Б, 4-Г"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:170,question:"Соотнесите понятия управление жизненным циклом ИТ-инфраструктуры с их содержанием:\n\n1. Обновление\n2. ИТ-инфраструктура предприятия\n3. Жизненный цикл ИТ-системы\n4. Техническое обслуживание\n\nА. Процесс поддержки и обслуживания аппаратных и программных компонентов ИТ-инфраструктуры\nБ. Этап жизненного цикла, включающий в себя модернизацию и замену устаревших компонентов ИТ-инфраструктуры\nВ. Совокупность аппаратных, программных, коммуникационных и сетевых ресурсов, необходимых для функционирования информационных систем\nГ. Последовательность этапов, через которые проходит информационная система, начиная от ее создания и внедрения до вывода из эксплуатации",options:[{id:"A",text:"1-Б, 2-В, 3-Г, 4-А"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:171,type:'open',question:"Каков первый шаг в управлении исследованием новых рынков ИТ-продуктов?",correct:["Определение целей исследования новых рынков"]},
  {id:172,type:'open',question:"Какой метод предполагает сбор информации о потенциальных клиентах непосредственно из источника?",correct:["Опросы"]},
  {id:173,type:'open',question:"Какова основная цель проведения анализа и исследования рынка ИТ-продукта?",correct:["Определение рыночных тенденций и определение потребностей клиентов"]},
  {id:174,type:'open',question:"На чем следует сосредоточить внимание при анализе конкурентов при проведении исследования новых рынков ИТ-продуктов?",correct:["Оценка предложений продуктов конкурентов"]},
  {id:175,type:'open',question:"Этап разработки подробных планов, включая определение объема проекта, создание иерархической структуры работ, оценку ресурсов и времени?",correct:["Планирование"]},
  {id:176,type:'open',question:"Что определяет метод критического пути (CPM)?",correct:["Самую длинную последовательность зависимых действий и определяет минимальную продолжительность проекта"]},
  {id:177,type:'open',question:"Какой подход предполагает партнерство с местными предприятиями или организациями для получения информации о новых рынках ИТ-продуктов?",correct:["Стратегические альянсы"]},
  {id:178,type:'open',question:"Какова цель сегментации рынка ИТ-продуктов при исследовании новых рынков?",correct:["Определение конкретных целевых групп клиентов"]},
  {id:179,type:'open',question:"Какой фактор имеет решающее значение в управлении исследованиями новых рынков для успешного выхода на них?",correct:["Постоянный мониторинг и оценка"]},
  {id:180,type:'open',question:"Этап, на котором план проекта приводится в действие, выполняются задачи?",correct:["Реализация"]},

  {id:186,question:"Какой оператор определяет тип переменной?",options:[{id:"A",text:"instanceof"},{id:"B",text:"typeof"},{id:"C",text:"!"},{id:"D",text:"in"}],correct:["B"]},

  {id:190,question:"Какой результат даст вычисление логического выражения (на втором месте строка с символом пробела) : false || \" \" || !0 ?",options:[{id:"A",text:"строка с символом пробела"},{id:"B",text:"false"},{id:"C",text:"true"},{id:"D",text:"0"}],correct:["A"]},
  {id:191,question:"Что будет результатом выражения 67 + \"45\"?",options:[{id:"A",text:"\"6745\""},{id:"B",text:"\"112\""},{id:"C",text:"112"},{id:"D",text:"6745"}],correct:["A"]},
  {id:192,question:"Какой из операторов конкатенирует (склеивает) строки?",options:[{id:"A",text:"%"},{id:"B",text:"/"},{id:"C",text:"*"},{id:"D",text:"+"}],correct:["D"]},
  {id:193,question:"Какой из операторов находит остаток от деления?",options:[{id:"A",text:"*"},{id:"B",text:"/"},{id:"C",text:"%"},{id:"D",text:"+"}],correct:["C"]},
  {id:194,question:"Сколько переменных определено в записи: let myVar, myvar, _myvar?",options:[{id:"A",text:"1"},{id:"B",text:"2"},{id:"C",text:"3"},{id:"D",text:"4"}],correct:["C"]},
  {id:195,question:"Какой результат дает логическое выражение: !0 && \"privet\" && 56?",options:[{id:"A",text:"true"},{id:"B",text:"\"privet\""},{id:"C",text:"56"},{id:"D",text:"false"}],correct:["C"]},
  {id:196,question:"Какое значение переменной i первым выводит следующий цикл? let i=0; while (i>5){ i++; }",options:[{id:"A",text:"0"},{id:"B",text:"4"},{id:"C",text:"5"},{id:"D",text:"6"}],correct:["A"]},
  {id:197,question:"Какой метод изменяет порядок элементов массива, не копируя его?",options:[{id:"A",text:"unshift"},{id:"B",text:"push"},{id:"C",text:"reverse"},{id:"D",text:"concat"}],correct:["C"]},
  {id:198,question:"Какой метод используется для объединения двух, или более массивов в один?",options:[{id:"A",text:"unshift"},{id:"B",text:"push"},{id:"C",text:"reverse"},{id:"D",text:"concat"}],correct:["D"]},
  {id:199,question:"Что называют функциональными литералами?",options:[{id:"A",text:"функциональные выражения"},{id:"B",text:"стрелочные функции"},{id:"C",text:"классические функции"},{id:"D",text:"паттерн IIFE"}],correct:["A"]},
  {id:200,question:"Задает ширину текстового поля в символах аттрибут …",options:[{id:"A",text:"cols"},{id:"B",text:"rows"},{id:"C",text:"readonly"},{id:"D",text:"size"}],correct:["A"]},
  {id:201,question:"Флаг в регулярном выражении, который позволяет искать все совпадения, без него будет найдено только первое",options:[{id:"A",text:"s"},{id:"B",text:"m"},{id:"C",text:"g"},{id:"D",text:"i"}],correct:["C"]},
  {id:202,question:"C помощью тега <img> в HTML-документе можно разместить …",options:[{id:"A",text:"объект мультимедиа"},{id:"B",text:"таблицу"},{id:"C",text:"графический объект"},{id:"D",text:"гиперссылку"}],correct:["C"]},
  {id:203,question:"Какое значение свойства display позволит сделать из блока грид-контейнер",options:[{id:"A",text:"display: block"},{id:"B",text:"display:flex"},{id:"C",text:"display: inline"},{id:"D",text:"display: grid"}],correct:["D"]},

  {id:324,question:"Установите соответствие между задачами информационного обеспечения сайта и их описаниями:\n\n1. Обеспечение актуальной информации\n2. Ведение новостных лент\n3. Создание FAQ разделов\n\nА) Поддержка интереса пользователей\nБ) Ответы на часто задаваемые вопросы\nВ) Обновление контента для повышения значимости сайта",options:[{id:"A",text:"1-Б, 2-В, 3-А"},{id:"B",text:"1-А, 2-Б, 3-В"},{id:"C",text:"1-В, 2-А, 3-Б"},{id:"D",text:"1-Б, 2-А, 3-В"}],correct:["A"]},

  {id:326,question:"Установите соответствие между компонентами архитектуры и их функциями:\n\n1. Клиент\n2. Сервер\n3. Сеть\n\nА) Устройство или программа, которая отправляет запросы на сервер\nБ) Инфраструктура, обеспечивающая связь между клиентами и серверами\nВ) Мощная машина или программа, которая обрабатывает запросы клиентов",options:[{id:"A",text:"1-А, 2-В, 3-Б"},{id:"B",text:"1-Б, 2-А, 3-В"},{id:"C",text:"1-В, 2-Б, 3-А"},{id:"D",text:"1-А, 2-Б, 3-В"}],correct:["A"]},
  {id:327,question:"Установите соответствие между методами JavaScript и их действиями:\n\n1. querySelectorAll\n2. createElement\n3. innerHTML\n4. remove\n\nА) позволяет удалить элемент\nБ) позволяет создать новый элемент\nВ) позволяет добавить или изменить элементу текст\nГ) возвращает все элементы, удовлетворяющие CSS-селектору",options:[{id:"A",text:"1-Г, 2-Б, 3-В, 4-А"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:328,question:"Установите соответствие между событиями JavaScript и их действиями:\n\n1. onFocus\n2. onKeyDown\n3. onDblClick\n4. onLoad\n\nА) Двойной щелчок\nБ) Закончена загрузка документа\nВ) Нажата и отпущена клавиша на клавиатуре\nГ) Получение элементом фокуса",options:[{id:"A",text:"1-Г, 2-В, 3-А, 4-Б"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:329,question:"Установите соответствие между типами данных в JavaScript и их обозначениями:\n\n1. целое число произвольной длины\n2. строка\n3. отдельный тип, для неизвестных значений\n4. отдельный тип, для неприсвоеных значений\n\nА) bigint\nБ) string\nВ) null\nГ) undefined",options:[{id:"A",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:330,question:"Установите соответствие между операторами JavaScript и их обозначениями:\n\n1. побитовое И\n2. побитовое ИЛИ\n3. побитовое исключающее ИЛИ\n4. побитовый сдвиг влево\n\nА) &\nБ) |\nВ) ^\nГ) <<",options:[{id:"A",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:331,question:"Установите соответствие между методами JS и их назначением:\n\n1) toUpperCase()\n2) indexOf()\n3) substr()\n4) shift()\n\nА) используется для преобразования всех символов в строке в верхний регистр\nБ) возвращает индекс первого вхождения указанного значения в строке\nВ) возвращает указанное количество символов из строки\nГ) удаляет первый элемент из массива и возвращает его значение",options:[{id:"A",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:332,question:"Установите соответствие между методами объекта Math и их назначением:\n\n1) абсолютная величина аргумента\n2) наименьшее /большее или равное целое\n3) наибольшее /наименьшее/равное число\n4) округление до целого\n\nА) abs\nБ) ceil\nВ) floor\nГ) round",options:[{id:"A",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:333,question:"Установите соответствие между методами для работы с объектами в JavaScript и их назначением:\n\n1) Object.values()\n2) Object.keys()\n3) Object.freeze()\n4) Object.seal()\n\nА) Позволяет получить все значения, заключённые в объекте\nБ) Возвращает массив, содержащий все ключи внутри объекта\nВ) Позволяет заморозить объект\nГ) Предотвращает добавление новых свойств к объекту",options:[{id:"A",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"B",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
