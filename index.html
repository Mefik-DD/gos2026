  {id:361,question:"Организационная структура управления организацией - это …",options:[{id:"A",text:"Упорядоченная совокупность звеньев управления организацией"},{id:"B",text:"Перечень органов управления организацией"},{id:"C",text:"Штатное расписание, представленное графически"},{id:"D",text:"Бизнес-модель"}],correct:["A"]},
  {id:362,question:"… - это такая структура органов управления, в которой каждый орган управления специализирован на выполнении определенного круга производственных, технологических, проектных, финансовых, информационных или обеспечивающих функций.",options:[{id:"A",text:"Линейная структура управления"},{id:"B",text:"Линейно-функциональная структура управления"},{id:"C",text:"Функциональная структура управления"},{id:"D",text:"Матричная структура управления"}],correct:["C"]},
  {id:363,question:"Проект реинжиниринга бизнес-процессов предприятия предполагает построение моделей двух видов …",options:[{id:"A",text:"«в чем суть проблемы» и «как мы ее будем решать»"},{id:"B",text:"«место на рынке» и «наша стратегия»"},{id:"C",text:"«как есть» и «как должно быть»"},{id:"D",text:"«стратегическая цель» и «способы ее достижения»"}],correct:["C"]},
  {id:364,question:"К недостаткам функционального управления относят…",options:[{id:"A",text:"Нескоординированность подразделений"},{id:"B",text:"Заинтересованность в результатах труда"},{id:"C",text:"Сложность структуры управления"},{id:"D",text:"Энергоемкость"}],correct:["A"]},
  {id:365,question:"Цепочки создания добавленной стоимости подразделяются на …",options:[{id:"A",text:"Первичные и вторичные"},{id:"B",text:"Основные и дополнительные"},{id:"C",text:"Главные и второстепенные"},{id:"D",text:"Основные и вспомогательные"}],correct:["A"]},
  {id:366,question:"Статус центра прибыли имеет …",options:[{id:"A",text:"Основное производственное подразделение"},{id:"B",text:"Предприятие"},{id:"C",text:"Финансовая служба предприятия"},{id:"D",text:"Отдел"}],correct:["B"]},
  {id:367,question:"Основной деятельностью компании является производство счетчиков расхода жидкостей и оказание услуг по их монтажу на местах эксплуатации. Для обеспечения этой деятельности компания также осуществляет изготовление упаковочной тары и доставку счетчиков клиентам. Сколько первичных цепочек создания добавленной стоимости существует на предприятии?",options:[{id:"A",text:"1"},{id:"B",text:"2"},{id:"C",text:"4"},{id:"D",text:"5"}],correct:["B"]},
  {id:368,question:"Предприятие, занимающееся производством, поставкой и обслуживанием компьютерных систем, создало свой учебный центр для подготовки производственного персонала. В дальнейшем центр стал осуществлять также самостоятельную деятельность по переподготовке сотрудников компаний-заказчиков. К какому виду цепочек создания добавленной стоимости относится деятельность учебного центра теперь?",options:[{id:"A",text:"К вторичной, так как не связана с основной деятельностью"},{id:"B",text:"К первичной, так как это стало новым видом деятельности предприятия"},{id:"C",text:"К первичной для внешних заказчиков, так как это стало новым видом деятельности предприятия, к вторичной - для внутренних заказчиков"},{id:"D",text:"К вторичной, так как связана с основной деятельностью"}],correct:["C"]},
  {id:369,question:"Основные подходы к моделированию бизнес-процессов делятся на:",options:[{id:"A",text:"Функциональные и объектно-ориентированные"},{id:"B",text:"Детерминированные и стохастические"},{id:"C",text:"Информационные и причинно-следственные"},{id:"D",text:"Логические и диаграммные"}],correct:["A"]},
  {id:370,question:"Целями моделирования бизнес-процессов являются:",options:[{id:"A",text:"Построение наилучшей модели"},{id:"B",text:"Ускорение выполнения проекта"},{id:"C",text:"Анализ недостатков фирмы и построение лучшей модели фирмы"},{id:"D",text:"Минимизация стоимости проекта"}],correct:["C"]},
  {id:371,question:"Технология моделирования бизнес-процессов - это процесс …",options:[{id:"A",text:"Отражения субъективного видения потока работ в виде формальной модели, состоящей из взаимосвязанных операций"},{id:"B",text:"Определения стоимости рабочего места исполнителя процесса"},{id:"C",text:"Использования машинных программ классификации и структуризации бизнес-процессов"},{id:"D",text:"Поэтапного описания существующих бизнес-процессов"}],correct:["A"]},
  {id:372,question:"Функция управления - это …",options:[{id:"A",text:"Направление деятельности элемента организационной структуры, представляющее собой совокупность однородных операций (действий), выполняемых на постоянной основе"},{id:"B",text:"Математическая модель, описывающая действия аппарата управления"},{id:"C",text:"Направление деятельности элемента организационной структуры, представляющее собой совокупность однородных операций (действий)"},{id:"D",text:"Определение стоимости рабочего места исполнителя процесса"}],correct:["A"]},
  {id:373,question:"Функционально-стоимостный анализ - это …",options:[{id:"A",text:"Метод определения стоимости и других характеристик изделий, услуг и потребителей, в основе которого лежит использование функций и ресурсов, задействованных в производстве, маркетинге, продаже, доставке, технической поддержке, оказании услуг, обслуживании клиентов, а также в обеспечении качества"},{id:"B",text:"Определение стоимости рабочего места исполнителя процесса, определение коэффициента трудового вклада исполнителя и других корректирующих коэффициентов, а также формирование отчета по результатам функционально-стоимостного анализа"},{id:"C",text:"Один из методов, позволяющий указать на возможные пути улучшения стоимостных показателей, цель которого - достичь улучшений в работе предприятий по показателям стоимости, трудоемкости и производительности"},{id:"D",text:"Математическая модель, описывающая действия аппарата управления"}],correct:["A"]},
  {id:374,question:"Методология функционально-стоимостного анализа при моделировании бизнес-процессов - это …",options:[{id:"A",text:"Анализ функций, который позволяет сначала определять стоимостные затраты на выполнение процессов, далее стоимость функций переносится на стоимостные объекты"},{id:"B",text:"Анализ бизнес-процессов с целью выбрать процессы с наиболее низкой стоимостью и рекомендовать увеличить их долю в структуре выпускаемых изделий производстве"},{id:"C",text:"Анализ бизнес-процессов с целью максимально сократить количество выпускаемой продукции, не добавляющей стоимость предприятию"},{id:"D",text:"Определение стоимости рабочего места исполнителя процесса, определение коэффициента трудового вклада исполнителя и других корректирующих коэффициентов, а также формирование отчета по результатам функционально-стоимостного анализа"}],correct:["A"]},
  {id:375,question:"В основе метода … лежит предположение, что «деятельность потребляет ресурсы, а продукция потребляет деятельность».",options:[{id:"A",text:"ABC"},{id:"B",text:"АСЦ"},{id:"C",text:"SWOT"},{id:"D",text:"PEST"}],correct:["A"]},
  {id:376,question:"… - это экономические элементы, необходимые для осуществления деятельности, источник затрат.",options:[{id:"A",text:"Механизмы"},{id:"B",text:"Ресурсы"},{id:"C",text:"Связи"},{id:"D",text:"Воздействия"}],correct:["B"]},
  {id:377,question:"Фактор затрат - это …",options:[{id:"A",text:"Показатель, оценивающий результаты деятельности"},{id:"B",text:"Характеристика, определяющая рабочую нагрузку и усилия, требуемые для осуществления деятельности, а также необходимые ресурсы"},{id:"C",text:"Показатель потребления ресурса, используемый для определения доли от общих затрат ресурсов, присваиваемой каждому виду деятельности, использующему данный ресурс"},{id:"D",text:"Математическая модель, описывающая действия аппарата управления"}],correct:["B"]},
  {id:378,question:"Для окраски готового изделия требуется 1,5 банки краски стоимостью 200 рублей за банку, процесс длится 1 час. Какова стоимость окраски изделия, если нормо-час работы маляра стоит 300 рублей, а другие ресурсы не используются?",options:[{id:"A",text:"500 рублей"},{id:"B",text:"600 рублей"},{id:"C",text:"650 рублей"},{id:"D",text:"950 рублей"}],correct:["B"]},
  {id:379,question:"Как повлияет на стоимость замена краски, если при стоимости банки 100 рублей время процесса увеличится на 50%?",options:[{id:"A",text:"Стоимость уменьшится вдвое"},{id:"B",text:"Стоимость увеличится вдвое"},{id:"C",text:"Стоимость не изменится"},{id:"D",text:"Стоимость попеременно будет меняться"}],correct:["C"]},
  {id:380,question:"Бизнес-процесс оказания услуг включает функцию 1, повторяющуюся в разных комбинациях 5 раз, и функцию 2, повторяющуюся 4 раза. Чему равна стоимость бизнес-процесса, если стоимость функции 1 составляет 600 рублей, а функции 2 - 800 рублей?",options:[{id:"A",text:"6200 рублей"},{id:"B",text:"6400 рублей"},{id:"C",text:"64000 рублей"},{id:"D",text:"62000 рублей"}],correct:["A"]},
  {id:381,question:"Если в результате оптимизации любой из этих функций (но только одной одновременно) можно снизить ее стоимость на 100 рублей, какую функцию стоит оптимизировать?",options:[{id:"A",text:"Функцию 2, так как ее стоимость выше"},{id:"B",text:"Функцию 1, так как она повторяется чаще"},{id:"C",text:"В обоих случаях результат равнозначен"},{id:"D",text:"В обоих случаях результат неравнозначен"}],correct:["B"]},
  {id:382,question:"Предприятие, работающее на конкурентном и динамичном рынке услуг, собирается реализовать ИСУП. Поступили предложения от интеграторов: внедрить монолитную систему, решающую все текущие задачи, и построить сервисно-ориентированную систему на основе действующих продуктов. Какой путь Вы выберите, если ценовые предложения интеграторов равны? Почему?",options:[{id:"A",text:"Сервисно-ориентированную систему, так как она позволяет повысить скорость адаптации бизнеса к быстроменяющимся требованиям рынка"},{id:"B",text:"Рыночную систему, так как она не позволяет сократить расходы на ИТ-системы на основе повторного использования их функциональных компонентов"},{id:"C",text:"Монолитную систему, так как отказ от разнородных систем позволяет снизить расходы на ИТ"},{id:"D",text:"Монолитную систему, так как подобные системы опираются на лучшие практики бизнес-процессов"}],correct:["A"]},
  {id:383,question:"Физическая сущность реинжиниринга - это …",options:[{id:"A",text:"Разделение предприятия на самостоятельно функционирующие участки с контролем на входе и выходе процессов"},{id:"B",text:"Технологическая модернизация предприятия"},{id:"C",text:"Переформирование подразделений предприятия на основе новой структуры"},{id:"D",text:"Перераспределение прав, ответственности и полномочий в соответствии с выбранной стратегией"}],correct:["A"]},
  {id:384,question:"Логическая сущность реинжиниринга - это …",options:[{id:"A",text:"Технико-технологическая модернизация предприятия на основе информационных технологий"},{id:"B",text:"Оптимизация организационной структуры предприятия в соответствии с выбранной стратегией"},{id:"C",text:"Переход организации на выпуск конкурентоспособной продукции"},{id:"D",text:"Новая структурированная форма управления предприятием на основе информационных технологий"}],correct:["D"]},
  {id:385,question:"Каковы ключевые факторы успеха реинжиниринга бизнес-процессов?",options:[{id:"A",text:"Мотивация персонала в РБП"},{id:"B",text:"Привлечение консультантов к РБП"},{id:"C",text:"Переход организации на выпуск конкурентоспособной продукции"},{id:"D",text:"Оптимизация организационной структуры предприятия"}],correct:["A"]},
  {id:386,question:"… бизнес-процесса - это степень соответствия реального бизнес-процесса своему документальному описанию.",options:[{id:"A",text:"Эффективность"},{id:"B",text:"Определенность"},{id:"C",text:"Результативность"},{id:"D",text:"Ресурсоемкость"}],correct:["B"]},
  {id:387,question:"Прямой инжиниринг - это…",options:[{id:"A",text:"Построение новой организации бизнес-процессов"},{id:"B",text:"Исследование существующей организации бизнес-процессов"},{id:"C",text:"Оптимизация бизнес-процессов"},{id:"D",text:"Привлечение консультантов к РБП"}],correct:["A"]},
  {id:388,question:"Процессное управление предприятием - это …",options:[{id:"A",text:"Описанные и утвержденные конкретные процессы управления протекающими на предприятии производственными процессами"},{id:"B",text:"Управление производством деталей и выполнением услуг на предприятии"},{id:"C",text:"Совокупность взаимосвязанных или взаимодействующих видов деятельности, преобразующая «входы» в «выходы»"},{id:"D",text:"Исследование существующей организации бизнес-процессов"}],correct:["A"]},
  {id:389,question:"Вы собираетесь открыть собственный интернет-магазин и задумались о проектировании его бизнес-процессов. Чем это будет являться в отношении бизнес-процессов?",options:[{id:"A",text:"Обратным инжинирингом"},{id:"B",text:"Прямым инжинирингом"},{id:"C",text:"Реинжинирингом"},{id:"D",text:"Коинжинирингом"}],correct:["B"]},
  {id:390,question:"Первой фазой действий станет …",options:[{id:"A",text:"Анализ текущих бизнес-процессов"},{id:"B",text:"Планирование бизнес-процессов"},{id:"C",text:"Мониторинг бизнес-процессов"},{id:"D",text:"Прогнозирование бизнес-процессов"}],correct:["B"]},
  {id:391,question:"Какие из перечисленных характеристик являются обязательными признаками проекта?",options:[{id:"A",text:"Временный характер"},{id:"B",text:"Большой бюджет"},{id:"C",text:"Уникальность цели"},{id:"D",text:"Использование аутсорсинга"}],correct:["A","C"]},
  {id:392,question:"Какие из следующих ролей в процессном управлении несут ответственность за непосредственное управление и результаты процесса?",options:[{id:"A",text:"Владелец процесса"},{id:"B",text:"Процессный аналитик"},{id:"C",text:"Менеджер процесса"},{id:"D",text:"Проектировщик процессов"}],correct:["A","C"]},
  {id:393,question:"Какие из перечисленных методов являются правильными для сбора информации при моделировании бизнес-процессов?",options:[{id:"A",text:"Рабочие семинары с участниками процесса"},{id:"B",text:"Последовательное интервьюирование экспертов"},{id:"C",text:"Анализ существующей документации компании"},{id:"D",text:"Использование только должностных инструкций"}],correct:["A","B","C"]},
  {id:394,question:"Какие из перечисленных элементов относятся к основным WF-паттернам (шаблонам workflow)?",options:[{id:"A",text:"Последовательность (Sequence)"},{id:"B",text:"Параллельное расщепление (AND-split)"},{id:"C",text:"Дискриминатор (Discriminator)"},{id:"D",text:"Исключающий выбор (XOR-split)"}],correct:["A","B","D"]},
  {id:395,question:"Какие из перечисленных технологий и стандартов относятся к экосистеме BPM (Business Process Management)?",options:[{id:"A",text:"Системы управления бизнес-процессами (BPMS)"},{id:"B",text:"Сервис-ориентированная архитектура (SOA)"},{id:"C",text:"Системы управления бизнес-правилами (BRMS)"},{id:"D",text:"Системы управления взаимоотношениями с клиентами (CRM)"}],correct:["A","B","C"]},
  {id:396,question:"Какие из следующих принципов относятся к принципам перепроектирования бизнес-процессов по Хаммеру?",options:[{id:"A",text:"Горизонтальное сжатие процессов"},{id:"B",text:"Увеличение количества проверок и согласований"},{id:"C",text:"Децентрализация ответственности"},{id:"D",text:"Сохранение линейной последовательности этапов"}],correct:["A","C"]},
  {id:397,question:"Какие из перечисленных критериев используются для выбора приоритетных процессов для оптимизации?",options:[{id:"A",text:"Количество сотрудников в процессе"},{id:"B",text:"Важность процесса для стратегических целей"},{id:"C",text:"Степень проблемности процесса"},{id:"D",text:"Возраст руководителя подразделения"}],correct:["B","C"]},
  {id:398,question:"Какие из перечисленных уровней изменений бизнес-модели относятся к классификации Run-Change-Disrupt?",options:[{id:"A",text:"Run (автоматизация)"},{id:"B",text:"Improve (улучшение)"},{id:"C",text:"Change (качественное изменение)"},{id:"D",text:"Disrupt (переосмысление)"}],correct:["A","C","D"]},
  {id:399,question:"Какие из следующих характеристик должны быть у показателей эффективности процессов?",options:[{id:"A",text:"Сбалансированность и взаимосвязанность"},{id:"B",text:"Максимальная сложность расчета"},{id:"C",text:"Ориентированность на внутренние удобства"},{id:"D",text:"Подкрепленность стимулами"}],correct:["A","D"]},
  {id:400,question:"Какие из перечисленных ошибок являются типичными при проведении реинжиниринга?",options:[{id:"A",text:"Фундаментальное переосмысление процессов"},{id:"B",text:"Попытка улучшить, а не перепроектировать процесс"},{id:"C",text:"Недостаточное ресурсное обеспечение"},{id:"D",text:"Слишком активное участие топ-менеджмента"}],correct:["B","C"]},
  {id:401,question:"Установите соответствие:\n\n1. Процесс\n2. Информационный процесс\n3. Бизнес-процесс\n\nА. Совокупность взаимосвязанных операций по извлечению, хранению, передаче, преобразованию и предоставлению информации\nБ. Целенаправленная последовательность действий, переводящая объект из исходного состояния в конечное\nВ. Совокупность взаимосвязанных мероприятий или задач, направленных на создание определенного продукта или услуги для потребителя",options:[{id:"A",text:"1-Б, 2-А, 3-В"},{id:"B",text:"1-А, 2-Б, 3-В"},{id:"C",text:"1-В, 2-А, 3-Б"},{id:"D",text:"1-Б, 2-В, 3-А"}],correct:["A"]},
  {id:402,question:"Соотнесите виды моделей бизнес-процессов и их характеристики:\n\n1. Функциональные\n2. Поведенческие\n3. Структурные\n4. Информационные\n\nА. Характеризуют морфологию системы - состав подсистем, их взаимосвязи\nБ. Описывают совокупность выполняемых системой функций и их входы и выходы\nВ. Отражают структуры данных - их состав и взаимосвязи\nГ. Показывают, когда и/или при каких условиях выполняются бизнес-функции, с помощью таких категорий, как состояние системы, событие, переход из одного состояния в другое, условия перехода, последовательность событий",options:[{id:"A",text:"1-Б, 2-Г, 3-А, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:403,question:"Соотнесите основные виды архитектур информационных систем и их характеристики:\n\n1. Файл-сервер\n2. Клиент-сервер\n3. Трехслойная архитектура\n4. Интернет-архитектура\n\nА. Базируется на дальнейшей специализации компонент архитектуры: клиент занимается только организацией интерфейса с пользователем, сервер баз данных - только стандартизованной обработкой данных\nБ. Разновидность трехслойной архитектуры на основании использования web-технологий. В этой разновидности роль сервера приложений играет web-сервер, а в качестве клиента используется стандартный web-браузер\nВ. Как исполняемые модули, так и данные размещаются в отдельных файлах операционной системы. Доступ к данным осуществляется путем указания пути (path) и использования файловых операций (открыть, считать, записать). Для хранения данных используется выделенный сервер (отдельный компьютер), который и является файловым сервером\nГ. Это не только архитектура, это - новая парадигма, пришедшая на смену устаревшим концепциям. Суть ее заключается в том, что клиент (исполняемый модуль) запрашивает те или иные сервисы в соответствии с определенным протоколом обмена данными. При этом нет необходимости в использовании прямых путей операционной системы",options:[{id:"A",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:404,question:"Установите соответствие между характеристиками архитектуры ИС:\n\n1. Файл-сервер\n2. Клиент-сервер\n3. Трехслойная архитектура\n4. Интернет-архитектура\n\nА. Несколько отдельных серверов для установки СУБД; очень большие объемы передаваемых данных; высокое число клиентов (свыше 100); затруднительно модернизировать (модификация затрагивает модули клиентского ПО)\nБ. Отдельный сервер для установки СУБД; большие объемы передаваемых данных; среднее число клиентов (около 100); сложно модернизировать (модификация затрагивает часть клиентского ПО)\nВ. Несколько отдельных серверов для установки СУБД; очень большие объемы передаваемых данных; высокое число клиентов (свыше 1000) просто модернизировать (модификация не затрагивает клиентское ПО)\nГ. Установка СУБД на клиентском компьютере; малые объемы передаваемых данных; малое число клиентов (около 10); очень сложно модернизировать (модификация затрагивает клиентское ПО)",options:[{id:"A",text:"1-Г, 2-Б, 3-А, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:405,question:"Соотнесите параметры стоимостной информации и их содержание:\n\n1. Frequence Multiplier\n2. Time Information\n3. Cost information\n4. Total\n5. Total * Frequency\n\nА. Единица измерений длительности (unit) в секундах, минутах, часах и т.д.; длительность (duration) одной операции; длительность*Частота - автоматически формируемый показатель\nБ. Автоматически подсчитывается итог затрат по операции\nВ. Устанавливается частота выполнения функции в одном экземпляре процесса или за определенной период времени\nГ. Последовательно заполняются статьи затрат, часть из которых может быть связана прямой зависимостью с длительностью операции, например, заработная плата, амортизация и т.д.\nД. Автоматически рассчитывается сумма затрат по операции на процесс",options:[{id:"A",text:"1-В, 2-А, 3-Г, 4-Б, 5-Д"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г, 5-Д"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б, 5-Д"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А, 5-Д"}],correct:["A"]},
  {id:406,question:"Соотнесите инструментальные методы оценки эффективности исполнения функций в ключевых бизнес-процессах и их характеристики:\n\n1. Функционально-стоимостной анализ\n2. Анализ издержек по функциям\n3. Анализ загруженности сотрудников\n4. Информационный аудит\n\nА. Позволяет оценить эффективность информационной системы, риски ее использования и выбрать направления для ее совершенствования\nБ. Большинство отчетных форм о выполнении логистического плана содержат показатели логистических издержек, сгруппированные по функциональным областям логистики, например, издержки в материальном менеджменте, издержки на операции физического распределения и т.п., и внутри этих областей по логистическим функциям\nВ. Инструмент, предназначенный для оценки себестоимости продукта (услуги)\nГ. Позволяет сделать заключение о полноте и равномерности загрузки каждого работника, выявить существующие резервы в использовании рабочего времени, обнаружить возможные «узкие места», которые в дальнейшем могут привести к возникновению у компании проблем",options:[{id:"A",text:"1-В, 2-Б, 3-Г, 4-А"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:407,question:"Соотнесите используемые при проведении функционально-стоимостного анализа системы управления подходы и их характеристики:\n\n1. Функциональный подход\n2. Стоимостной подход\n3. Системный подход\n4. Общенациональный подход\n\nА. Определяет ту или иную выполняемую функцию управления\nБ. Предполагает исследование функций управления (выявление, определение, анализ, выводы с предложениями) с целью обеспечения наиболее полного и эффективного их выполнения\nВ. Оценивает результаты функционирования системы управления и затраты на ее обеспечение\nГ. Означает исследование управления как системы во взаимосвязи и взаимодействии всех ее элементов и подсистем между собой и с внешней средой",options:[{id:"A",text:"1-Б, 2-А, 3-Г, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:408,question:"Соотнесите признаки классификации функций и их содержание:\n\n1. По области проявления\n2. По роли в удовлетворении потребностей\n3. По роли в рабочем процессе\n4. По характеру проявления\n5. По характеру получаемого результата\n\nА. Основные функции подчинены главной и обусловливают работоспособность объекта, создание необходимых условий для осуществления главной функции. С помощью вспомогательных функций реализуются основные функции. В ходе оценки функций часто обнаруживается, что именно во вспомогательных функциях заложены основные резервы снижения себестоимости объекта\nБ. Внешние функции выполняются объектом в целом и определяют его назначение при взаимодействии с внешней средой. Внутренние функции определяются составом действий и взаимосвязей внутри объекта и выполняются его элементами\nВ. Главная функция отражает главную цель создания объекта, второстепенная - побочную цель, но она может способствовать увеличению спроса на изделие\nГ. Полезные и бесполезные, а последние делят на нейтральные и вредные\nД. Номинальные функции создаются при формировании и создании объекта и обязательны для выполнения. Потенциальные функции отражают возможность выполнения объектом каких-либо функций при изменении условий его эксплуатации. Действительные функции - фактически выполняемые функции",options:[{id:"A",text:"1-Б, 2-В, 3-А, 4-Д, 5-Г"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г, 5-Д"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б, 5-Д"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А, 5-Д"}],correct:["A"]},
  {id:409,question:"Соотнесите этапы функционально-стоимостного анализа (ФСА) и их содержание:\n\n1. Подготовительный этап\n2. Информационный этап\n3. Аналитический этап\n4. Творческий этап\n5. Исследовательский этап\n6. Разработка рекомендаций по внедрению результатов\n\nА. Выбор наилучшего из предлагаемых вариантов усовершенствования объекта; экспериментальное испытание усовершенствованного объекта; оформление результатов ФСА, их согласование с заинтересованными лицами, подразделениями и утверждение\nБ. Анализ функций объекта; определение значимости и стоимости функций объекта, их сравнение; выявление функциональных зон с превышением затрат над значимостью функций; постановка задач поиска более рациональных и оптимальных решений\nВ. Выбор объекта и определение цели ФСА; подбор и утверждение состава исследовательской рабочей группы; обучение специалистов основам ФСА\nГ. Поиск оптимальных параметров улучшения моделей; поиск улучшенных структурно-функциональных моделей объекта\nД. Составление и оформление необходимой информации для внедрения результатов исследования; согласование предложений с заинтересованными подразделениями и их утверждение; организация работ по реализации предложений; материальное и моральное вознаграждение участников; оформление отчета о выполненной работе с предложениями по улучшению проведения ФСА\nЕ. Сбор и получение информации об объекте, его недостатках; определение списка основных показателей, характеризующих объект, требований к нему; построение структурно-функциональной модели объекта",options:[{id:"A",text:"1-В, 2-Е, 3-Б, 4-Г, 5-А, 6-Д"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г, 5-Д, 6-Е"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б, 5-Д, 6-Е"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А, 5-Е, 6-Д"}],correct:["A"]},
  {id:410,question:"Соотнесите методы анализа конкурентной среды и их характеристики:\n\n1. Опросы потребителей\n2. Мониторинг мест продаж\n3. Поиск в интернете\n4. Интервьюирование экспертов\n\nА. Дадут понимание качества продукта конкурентов, его имиджа на рынке\nБ. Демонстрирует качество и условия выкладки товаров, стратегии в области промо-акций и ассортименте\nВ. Количественный или качественный сбор и анализ мнений и представлений о конкурентах среди разных целевых групп для определения их слабых и сильных сторон\nГ. Отзывы, сайты конкурентов, обзоры и пр.",options:[{id:"A",text:"1-В, 2-Б, 3-Г, 4-А"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
  {id:411,question:"Соотнесите методы анализа конкурентной среды и их характеристики:\n\n1. Опрос менеджеров по продажам\n2. Изучение отраслевых обзоров\n3. Тематические выставки, конференции и семинары\n\nА. Данные об участниках рынка, контактах и коммуникационной стратегии\nБ. Инсайдерские данные (торговый персонал может предоставить презентации, специальные программы конкурентов)\nВ. Изучение отраслевых обзоров. Публикации финансовых показателей, открытых рейтингов, иногда и принципиальных характеристик бизнеса",options:[{id:"A",text:"1-Б, 2-В, 3-А"},{id:"B",text:"1-А, 2-Б, 3-В"},{id:"C",text:"1-В, 2-А, 3-Б"},{id:"D",text:"1-Б, 2-А, 3-В"}],correct:["A"]},
  {id:412,question:"Соотнесите типы анализа конкурентной среды в интернете и их характеристики:\n\n1. Анализ конкурентной среды перед запуском проекта\n2. Постанализ конкурентов\n3. Регулярный мониторинг\n\nА. Дополнение данных начального анализа конкурентов свежими сведениями. К нему обращаются, если, допустим, вы решили что-то принципиально модернизировать на сайте или на время отложить старт проекта\nБ. Исследование активности конкурентов во время функционирования сайта. Это исследование и анализ публикаций о конкурентах в печати и СМИ, на форумах, в соцсетях, изучение обновлений на их сайтах. Он дает возможность иметь самую новую информацию обо всех происходящих изменениях, что делает ваши решения в бизнесе более продуктивными\nВ. Дает возможность определения стратегии запуска проекта и при необходимости актуальной и оперативной корректировки. Данный анализ делает возможной оценку загруженности рынка продуктами-конкурентами вашего товара и качественных характеристик ваших возможных соперников",options:[{id:"A",text:"1-В, 2-А, 3-Б"},{id:"B",text:"1-А, 2-Б, 3-В"},{id:"C",text:"1-В, 2-Б, 3-А"},{id:"D",text:"1-Б, 2-А, 3-В"}],correct:["A"]},
  {id:413,question:"Соотнесите этапы реализации проектов по совершенствованию бизнес-процессов и их содержание:\n\n1. Перепроектирование (совершенствование) бизнес-процесса\n2. Развертывание (выполнение), усовершенствованного бизнес-процесса\n3. Анализ бизнес-процесса\n4. Оценка и измерение бизнес-процесса\n5. Внедрение усовершенствованного бизнес-процесса\n6. Понимание проекта\n\nА. Этап подразумевает изменения в команде проекта, появление подпроектов и активную работу команды поддержки\nБ. Это этап сбора и анализа идей и их воплощения в варианты совершенствования бизнес-процесса. На данном этапе важно создать и использовать максимально широкую информационную базу - как идей и предложений всех заинтересованных сторон, так и внешней информации\nВ. Разработка описания проблем, которые должны быть решены; разработка предварительного плана проекта, в том числе ключевых контрольных точек проекта; определение всех заинтересованных сторон процесса; определение полного состава команды проекта; определение предварительного объема работ по проекту; определение состава желаемых улучшений в процессе; определение потенциальных рисков проекта; подготовка предварительного экономического обоснования для изменений в процессе\nГ. Фокусируется на внимательном изучении процесса (включая подпроцессы), который должен быть изменен. Необходимо собрать информацию о текущем («как есть») процессе различными способами\nД. Этап подразумевает определение ответственных за мониторинг и оценку достижения планируемых параметров и критериев бизнес-процесса. Это могут быть как члены проектной команды, так и новая межфункциональная команда, состоящая из представителей подразделений, непосредственно выполняющих бизнес-процесс\nЕ. На этом этапе в команду проекта включаются члены команды поддержки, которые до этого действовали независимо. Они становятся проводниками изменений для своих коллег, так как они могут ответить на возникающие вопросы и решить проблемы сотрудников, осваивающих новый бизнес-процесс",options:[{id:"A",text:"1-В, 2-Г, 3-Б, 4-А, 5-Е, 6-Д"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г, 5-Д, 6-Е"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б, 5-Е, 6-Д"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А, 5-Д, 6-Е"}],correct:["A"]},
  {id:414,question:"Соотнесите показатели эффективности бизнес-процессов и их характеристики:\n\n1. Сложность\n2. Процессность\n3. Контролируемость\n4. Ресурсоемкость\n5. Регулируемость\n\nА. Меньшее значение данного коэффициента (низкий уровень ресурсоемкости) характеризует повышение эффективности использования ресурсов в бизнес-процессе\nБ. При равенстве суммы собственников процессов и суммы классов бизнес-процессов (k отв =1) бизнес-процесс является контролируемым. При k отв <1 бизнес-процесс характеризуется пониженной степенью контролируемости\nВ. В случае значения kсл≤0,01 бизнес-процесс характеризуется как сложный\nГ. Уровень регулируемости бизнес-процесса снижается в случае, когда значение данного коэффициента k рег <1\nД. Достижение минимального значения k пр (0,5) характеризует модель бизнес-процессов как процессную",options:[{id:"A",text:"1-В, 2-Д, 3-Б, 4-А, 5-Г"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г, 5-Д"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б, 5-Д"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А, 5-Д"}],correct:["A"]},
  {id:415,question:"Соотнесите ключевые показатели оценки бизнес-процессов и их характеристики:\n\n1. Результативность бизнес-процесса\n2. Стоимость бизнес-процесса\n3. Время бизнес-процесса\n4. Качество бизнес-процесса\n5. Фрагментация бизнес-процесса\n\nА. Определяет эффективность и конкурентоспособность организации с использованием показателей, характеризующих стоимость процесса, либо величину издержек, потребляемых в процессах\nБ. Эти показатели можно оценить с использованием количественных показателей. Они достаточно специфичны, и для каждого бизнес-процесса индивидуальны\nВ. Могут быть использованы для оценки продукта. Такие показатели характеризуют продукт как параметр выхода оцениваемого бизнес-процесса\nГ. Требовательные клиенты влияют на уровень конкурентоспособности компании. Наиболее конкурентной оказывается та компания, длительность выполнения бизнес-процессов которой имеет наиболее короткие сроки\nД. Можно использовать, измеряя любые бизнес-процессы для характеристики организационной сложности бизнес-процесса, которая определяется по количеству различных структурных подразделений и числу сотрудников компании, принимающих участие в нем",options:[{id:"A",text:"1-В, 2-А, 3-Г, 4-Б, 5-Д"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г, 5-Д"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б, 5-Д"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А, 5-Д"}],correct:["A"]},
  {id:416,question:"Расположите функции производственной цепочки в логической последовательности:\n\nА) поставка\nБ) производство\nВ) закупка",options:[{id:"A",text:"В, Б, А"},{id:"B",text:"А, Б, В"},{id:"C",text:"Б, В, А"},{id:"D",text:"В, А, Б"}],correct:["A"]},
  {id:417,question:"Расположите инструменты моделирования бизнес-процессов в хронологической последовательности:\n\nА) ARIS\nБ) блок-схемы\nВ) BPMS",options:[{id:"A",text:"Б, А, В"},{id:"B",text:"А, Б, В"},{id:"C",text:"В, А, Б"},{id:"D",text:"Б, В, А"}],correct:["A"]},
  {id:418,question:"Установите последовательность реализации основных шагов при построении модели бизнес-процесса:\n\nА. Определение бизнес-функций\nБ. Определение ролей\nВ. Добавление событий\nГ. Привязка ролей к бизнес-функциям\nД. Определение порядка исполнения бизнес-функций\nЕ. Добавление документов и ресурсов",options:[{id:"A",text:"Б, Г, В, А, Д, Е"},{id:"B",text:"А, Б, В, Г, Д, Е"},{id:"C",text:"В, Г, Б, А, Д, Е"},{id:"D",text:"Б, В, А, Г, Д, Е"}],correct:["A"]},
  {id:419,question:"Укажите последовательность действий для метода ABC:\n\nА) затраты по каждому виду деятельности, необходимые для изготовления продукции, определяют, как произведение средних затрат в единицу времени по данному виду деятельности на продолжительность данного вида деятельности\nБ) в организации устанавливают все виды деятельности и определяют средние затраты по каждому виду деятельности\nВ) деятельность представляется как совокупность процессов (операций, переходов)",options:[{id:"A",text:"Б, В, А"},{id:"B",text:"А, Б, В"},{id:"C",text:"В, А, Б"},{id:"D",text:"Б, А, В"}],correct:["A"]},
  {id:420,question:"Установите последовательность проведения функционально-стоимостного анализа системы управления:\n\nА. Исследовательско-проектная, включающая творческий, исследовательский и рекомендательный этапы\nБ. Подготовительно-аналитическая, включающая подготовительный, информационный и аналитический этапы\nВ. Внедрение, включающее реализационный (непосредственно внедренческий) этап и этап оценки фактической эффективности",options:[{id:"A",text:"Б, А, В"},{id:"B",text:"А, Б, В"},{id:"C",text:"В, А, Б"},{id:"D",text:"Б, В, А"}],correct:["A"]},
  {id:421,question:"Расположите фазы проектирования бизнес-процессов в порядке их следования:\n\nА) планирование\nБ) использование\nВ) реализация\nГ) анализ",options:[{id:"A",text:"А, В, Г, Б"},{id:"B",text:"Б, А, В, Г"},{id:"C",text:"В, Г, Б, А"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:422,question:"Определите последовательность построения сервисно-ориентированной архитектуры (SOA):\n\nА) организация сервисной шины\nБ) определение основных функций\nВ) реинжиниринг бизнес-процессов на основе сервисов\nГ) разработка сервисов, соответствующих функциям",options:[{id:"A",text:"Б, Г, А, В"},{id:"B",text:"А, Б, В, Г"},{id:"C",text:"В, Г, Б, А"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:423,question:"Стоимостная информация заполняется в следующем порядке:\n\nА) в окне Time Information определяются единица измерений длительности (unit) в секундах, минутах, часах и т.д., длительность (duration) одной операции, длительность*Частота - автоматически формируемый показатель\nБ) в параметре Total автоматически подсчитывается итог затрат по операции\nВ) в окне Cost information последовательно заполняются статьи затрат, часть из которых может быть связана прямой зависимостью с длительностью операции, например, заработная плата, амортизация и т.д.\nГ) в параметре Frequence Multiplier устанавливается частота выполнения функции в одном экземпляре процесса или за определенной период времени. В примере частота соответствует числу заказов (процессов) 48 за неделю\nД) в параметре Total*Frequency автоматически рассчитывается сумма затрат по операции на процесс",options:[{id:"A",text:"Г, А, В, Б, Д"},{id:"B",text:"А, Б, В, Г, Д"},{id:"C",text:"В, Г, Б, А, Д"},{id:"D",text:"Б, В, А, Д, Г"}],correct:["A"]},
  {id:424,question:"Установите последовательность этапов реализации методики анализа и оценки конкурентной среды, разработанной ФАС:\n\nА. Определение степени концентрации товарного рынка\nБ. Выявление временного интервала исследования товарного рынка\nВ. Оценка состояния конкурентной среды на товарном рынке\nГ. Обнаружение продуктовых и географических границ товарного рынка\nД. Установление объема товарного рынка и долей компаний на рынке\nЕ. Составление аналитического отчета\nЖ. Раскрытие количества компаний, функционирующих на товарном рынке\nЗ. Выявление входных барьеров товарного рынка",options:[{id:"A",text:"Б, Г, Ж, Д, А, З, В, Е"},{id:"B",text:"А, Б, В, Г, Д, Е, Ж, З"},{id:"C",text:"В, Г, Д, Е, Ж, А, Б, З"},{id:"D",text:"Г, В, Б, А, Д, Е, Ж, З"}],correct:["A"]},
  {id:425,question:"Установите последовательность этапов анализ состояния конкурентной среды на товарных рынках:\n\nА. Определение состава продавцов и покупателей\nБ. Анализ факторов, формирующих конкурентную среду отрасли\nВ. Оценка интенсивности конкуренции в отрасли по существующим коэффициентам\nГ. Оценка рыночного потенциала и построение конкурентной карты рынка\nД. Выявление показателей и барьеров",options:[{id:"A",text:"Б, А, В, Д, Г"},{id:"B",text:"А, Б, В, Г, Д"},{id:"C",text:"В, Г, Б, А, Д"},{id:"D",text:"Б, В, А, Д, Г"}],correct:["A"]},
  {id:426,question:"Расположите элементы обобщенного бизнес-процесса в правильной последовательности:\n\nА) процесс\nБ) заказчик\nВ) потребитель",options:[{id:"A",text:"Б, А, В"},{id:"B",text:"А, Б, В"},{id:"C",text:"В, А, Б"},{id:"D",text:"Б, В, А"}],correct:["A"]},
  {id:427,question:"Установите последовательность этапов реализации проектов по совершенствованию бизнес-процессов:\n\nА) перепроектирование (совершенствование) бизнес-процесса\nБ) развертывание (выполнение), усовершенствованного бизнес-процесса\nВ) анализ бизнес-процесса\nГ) оценка и измерение бизнес-процесса\nД) внедрение усовершенствованного бизнес-процесса\nЕ) понимание проекта",options:[{id:"A",text:"Е, В, А, Д, Б, Г"},{id:"B",text:"А, Б, В, Г, Д, Е"},{id:"C",text:"В, Г, Б, А, Д, Е"},{id:"D",text:"Б, В, А, Д, Г, Е"}],correct:["A"]},
  {id:428,question:"Определите последовательность этапов оценки эффективности изменений:\n\nА) Сбор данных\nБ) Корректировка процессов\nВ) Анализ результатов\nГ) Подготовка отчёта",options:[{id:"A",text:"А, В, Б, Г"},{id:"B",text:"Б, А, В, Г"},{id:"C",text:"В, Г, Б, А"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:429,question:"Определите последовательность внедрения IT-решений в промышленном реинжиниринге:\n\nА) Выбор технологии\nБ) Оценка потребностей\nВ) Внедрение\nГ) Обучение персонала",options:[{id:"A",text:"Б, А, В, Г"},{id:"B",text:"А, Б, В, Г"},{id:"C",text:"В, Г, Б, А"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {id:430,question:"Определите последовательность этапов работы с IT-персоналом при реинжиниринге:\n\nА) Мотивация\nБ) Обучение новым процессам\nВ) Информирование сотрудников\nГ) Оценка вовлечённости",options:[{id:"A",text:"В, А, Б, Г"},{id:"B",text:"А, В, Б, Г"},{id:"C",text:"Б, Г, А, В"},{id:"D",text:"Г, В, Б, А"}],correct:["A"]},
  {{id:431,question:"Установите соответствие:\n\n1. Процесс\n2. Информационный процесс\n3. Бизнес-процесс\n\nА. Совокупность взаимосвязанных операций по извлечению, хранению, передаче, преобразованию и предоставлению информации\nБ. Целенаправленная последовательность действий, переводящая объект из исходного состояния в конечное\nВ. Совокупность взаимосвязанных мероприятий или задач, направленных на создание определенного продукта или услуги для потребителя",options:[{id:"A",text:"1-Б, 2-А, 3-В"},{id:"B",text:"1-А, 2-Б, 3-В"},{id:"C",text:"1-В, 2-А, 3-Б"},{id:"D",text:"1-Б, 2-В, 3-А"}],correct:["A"]},
{id:432,question:"Соотнесите виды моделей бизнес-процессов и их характеристики:\n\n1. Функциональные\n2. Поведенческие\n3. Структурные\n4. Информационные\n\nА. Характеризуют морфологию системы - состав подсистем, их взаимосвязи\nБ. Описывают совокупность выполняемых системой функций и их входы и выходы\nВ. Отражают структуры данных - их состав и взаимосвязи\nГ. Показывают, когда и/или при каких условиях выполняются бизнес-функции",options:[{id:"A",text:"1-Б, 2-Г, 3-А, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
{id:433,question:"Соотнесите основные виды архитектур информационных систем и их характеристики:\n\n1. Файл-сервер\n2. Клиент-сервер\n3. Трехслойная архитектура\n4. Интернет-архитектура",options:[{id:"A",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
{id:434,question:"Установите соответствие между характеристиками архитектуры ИС:\n\n1. Файл-сервер\n2. Клиент-сервер\n3. Трехслойная архитектура\n4. Интернет-архитектура",options:[{id:"A",text:"1-Г, 2-Б, 3-А, 4-В"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},
{id:435,question:"Соотнесите параметры стоимостной информации и их содержание:\n\n1. Frequence Multiplier\n2. Time Information\n3. Cost information\n4. Total\n5. Total * Frequency",options:[{id:"A",text:"1-В, 2-А, 3-Г, 4-Б, 5-Д"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г, 5-Д"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б, 5-Д"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А, 5-Д"}],correct:["A"]},
{id:436,question:"Соотнесите инструментальные методы оценки эффективности исполнения функций в ключевых бизнес-процессах и их характеристики:\n\n1. Функционально-стоимостной анализ\n2. Анализ издержек по функциям\n3. Анализ загруженности сотрудников\n4. Информационный аудит",options:[{id:"A",text:"1-В, 2-Б, 3-Г, 4-А"},{id:"B",text:"1-А, 2-Б, 3-В, 4-Г"},{id:"C",text:"1-В, 2-Г, 3-А, 4-Б"},{id:"D",text:"1-Г, 2-В, 3-Б, 4-А"}],correct:["A"]},

// === ФУНКЦИЯ ДЛЯ ВОПРОСОВ НА СООТВЕТСТВИЕ ===
function renderMatchingQuestion(q) {
  // Парсим вопрос для извлечения элементов
  // Формат: "1. Понятие1; 2. Понятие2; ... А) Определение1; Б) Определение2..."
  
  const leftItems = [];
  const rightItems = [];
  
  // Извлекаем левую часть (цифры 1, 2, 3...)
  const leftMatch = q.question.match(/(\d+\.[^;А-ЯA-Z]+)/g);
  if (leftMatch) {
    leftMatch.forEach(item => {
      const clean = item.replace(/^\d+\.\s*/, '').trim();
      if (clean) leftItems.push(clean);
    });
  }
  
  // Извлекаем правую часть (буквы А), Б), В)...)
  const rightMatch = q.question.match(/([А-ЯA-Z][\)\.]\s*[^;1-9]+)/g);
  if (rightMatch) {
    rightMatch.forEach(item => {
      const clean = item.replace(/^[А-ЯA-Z][\)\.]\s*/, '').trim();
      if (clean) rightItems.push(clean);
    });
  }
  
  // Если не удалось распарсить, используем варианты ответа
  if (leftItems.length === 0 && q.options) {
    q.options.forEach(opt => {
      if (opt.text.includes('-')) {
        const parts = opt.text.split('-');
        if (parts[0].match(/^\d/)) {
          leftItems.push(parts[0].trim());
        } else if (parts[0].match(/^[А-ЯA-Z]/)) {
          rightItems.push(parts[0].trim());
        }
      }
    });
  }
  
  // Создаем HTML
  let html = '<div class="matching-container" style="margin: 20px 0;">';
  html += '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px;">';
  html += '<div style="font-weight: 600; color: var(--text-light);">Понятие</div>';
  html += '<div style="font-weight: 600; color: var(--text-light);">Определение</div>';
  html += '</div>';
  
  leftItems.forEach((item, idx) => {
    html += `
      <div class="matching-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; padding: 12px; background: #f8fafc; border-radius: 8px; border: 2px solid #e2e8f0;">
        <div style="display: flex; align-items: center; font-weight: 500;">
          ${idx + 1}. ${item}
        </div>
        <select data-match="${idx}" class="matching-select" 
                style="width: 100%; padding: 10px; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: white;">
          <option value="">Выберите соответствие...</option>
          ${rightItems.map((right, rIdx) => `
            <option value="${rIdx}">${String.fromCharCode(1040 + rIdx)}) ${right}</option>
          `).join('')}
        </select>
      </div>
    `;
  });
  
  html += '</div>';
  html += `<button id="btn-check-matching" class="btn primary" style="margin-top: 10px;">
    ✅ Проверить соответствие
  </button>`;
  
  els.options.innerHTML = html;
  
  // Обработчик проверки
  document.getElementById('btn-check-matching').onclick = () => {
    checkMatchingAnswer(q, leftItems.length, rightItems);
  };
}

// === ПРОВЕРКА ОТВЕТА НА СООТВЕТСТВИЕ ===
function checkMatchingAnswer(q, totalItems, rightItems) {
  if (answered) return;
  
  const selects = document.querySelectorAll('.matching-select');
  const userAnswers = Array.from(selects).map(s => s.value);
  
  // Проверяем, все ли выбрано
  if (userAnswers.some(val => val === '')) {
    alert('Пожалуйста, выберите соответствие для всех пунктов!');
    return;
  }
  
  // Формируем ответ пользователя в формате "1-А, 2-Б, 3-В"
  const userAnswerStr = userAnswers.map((val, idx) => {
    const letter = String.fromCharCode(1040 + parseInt(val)); // А, Б, В...
    return `${idx + 1}-${letter}`;
  }).join(', ');
  
  // Сравниваем с правильным ответом
  const correctAnswer = q.correct[0] || q.correct;
  const isCorrect = userAnswerStr === correctAnswer;
  
  // Подсветка правильных/неправильных
  selects.forEach((select, idx) => {
    const selectedVal = select.value;
    const correctVal = correctAnswer.match(new RegExp(`${idx + 1}-([А-ЯA-Z])`))?.[1];
    const correctIdx = correctVal ? correctVal.charCodeAt(0) - 1040 : -1;
    
    const isMatch = parseInt(selectedVal) === correctIdx;
    select.style.borderColor = isMatch ? 'var(--success)' : 'var(--error)';
    select.style.background = isMatch ? '#dcfce7' : '#fee2e2';
    select.disabled = true;
  });
  
  answered = true;
  state.answers.push({ q, selected: [userAnswerStr], isCorrect });
  
  els.feedback.innerHTML = `
    <p><strong>Правильный ответ:</strong> ${correctAnswer}</p>
    <p class="status ${isCorrect ? 'ok' : 'err'}">
      ${isCorrect ? '✅ Все верно!' : '❌ Есть ошибки'}
    </p>
  `;
  els.feedback.classList.remove('hidden');
  
  document.getElementById('btn-check-matching').disabled = true;
  els.btnNext.classList.remove('hidden');
  els.btnNext.disabled = false;
}

// === ПРОВЕРКА ОТКРЫТОГО ВОПРОСА ===
function checkOpenAnswer(q) {
  if (answered) return;
  
  const input = document.getElementById('open-answer');
  const userAns = input.value.trim();
  
  if (!userAns) {
    alert('Введите ответ!');
    return;
  }
  
  const correctArr = q.correct.map(a => normalize(a));
  const isCorrect = correctArr.includes(normalize(userAns));
  
  answered = true;
  state.answers.push({ q, selected: [userAns], isCorrect });
  
  input.disabled = true;
  input.style.borderColor = isCorrect ? 'var(--success)' : 'var(--error)';
  input.style.background = isCorrect ? '#dcfce7' : '#fee2e2';
  
  document.getElementById('btn-check-open').disabled = true;
  
  els.feedback.innerHTML = `
    <p><strong>Ваш ответ:</strong> ${userAns}</p>
    <p><strong>Верный ответ:</strong> ${q.correct.join(' / ')}</p>
    <p class="status ${isCorrect ? 'ok' : 'err'}">
      ${isCorrect ? '✅ Верно!' : '❌ Неверно.'}
    </p>
  `;
  els.feedback.classList.remove('hidden');
  
  els.btnNext.classList.remove('hidden');
  els.btnNext.disabled = false;
}

// === ОБРАБОТКА ВЫБОРА ВАРИАНТА ===
function handleSelect(div, id, q, type) {
  if (answered) return;
  
  if (type === 'radio') {
    // Для одиночного выбора снимаем выделение со всех
    document.querySelectorAll('.option input').forEach(i => {
      i.checked = false;
      i.parentElement.classList.remove('selected');
    });
  }
  
  const input = document.getElementById(id);
  input.checked = !input.checked;
  
  // Подсветка выбранного
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('.option input:checked').forEach(inp => {
    inp.parentElement.classList.add('selected');
  });
  
  if (type === 'radio') {
    // Для одиночного выбора сразу проверяем
    finishAnswer(q);
  } else {
    // Для множественного выбора добавляем кнопку подтверждения
    if (!document.getElementById('btn-confirm')) {
      const btn = document.createElement('button');
      btn.id = 'btn-confirm';
      btn.className = 'btn primary';
      btn.textContent = '✅ Подтвердить выбор';
      btn.onclick = () => finishAnswer(q);
      els.options.appendChild(btn);
    }
  }
}

// === ЗАВЕРШЕНИЕ ОТВЕТА (для обычных вопросов) ===
function finishAnswer(q) {
  answered = true;
  
  const selected = Array.from(els.options.querySelectorAll('input:checked'))
    .map(i => i.value);
  
  const isCorrect = [...q.correct].sort().join(',') === [...selected].sort().join(',');
  
  state.answers.push({ q, selected, isCorrect });
  
  // Блокируем ввод
  els.options.querySelectorAll('input').forEach(i => i.disabled = true);
  els.options.querySelectorAll('.option').forEach(o => {
    o.style.pointerEvents = 'none';
    const inp = o.querySelector('input');
    if (q.correct.includes(inp.value)) {
      o.classList.add('correct');
    } else if (inp.checked) {
      o.classList.add('incorrect');
    }
  });
  
  // Удаляем кнопку подтверждения если есть
  const confirmBtn = document.getElementById('btn-confirm');
  if (confirmBtn) confirmBtn.remove();
  
  // Показываем фидбек
  els.feedback.innerHTML = `
    <p><strong>Ваш ответ:</strong> ${selected.join(', ') || 'Не выбрано'}</p>
    <p><strong>Верный ответ:</strong> ${q.correct.join(', ')}</p>
    <p class="status ${isCorrect ? 'ok' : 'err'}">
      ${isCorrect ? '✅ Верно!' : '❌ Неверно.'}
    </p>
  `;
  els.feedback.classList.remove('hidden');
  
  els.btnNext.classList.remove('hidden');
  els.btnNext.disabled = false;
}

      if (type === 'radio') { document.querySelectorAll('.option input').forEach(i => i.checked = false); }
      document.getElementById(id).checked = !document.getElementById(id).checked;
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      document.querySelectorAll('.option input:checked').forEach(inp => inp.parentElement.classList.add('selected'));
      if (type === 'radio') finishAnswer(q);
      else {
        if (!document.getElementById('btn-confirm')) {
          const btn = document.createElement('button'); btn.id = 'btn-confirm'; btn.className = 'btn primary'; btn.textContent = '✅ Подтвердить выбор';
          btn.onclick = () => finishAnswer(q); els.options.appendChild(btn);
        }
      }
    }

    function finishAnswer(q) {
      answered = true;
      const selected = Array.from(els.options.querySelectorAll('input:checked')).map(i => i.value);
      const isCorrect = [...q.correct].sort().join(',') === [...selected].sort().join(',');
      state.answers.push({ q, selected, isCorrect });
      els.options.querySelectorAll('input').forEach(i => i.disabled = true);
      els.options.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
      if (document.getElementById('btn-confirm')) document.getElementById('btn-confirm').remove();

      els.feedback.innerHTML = `<p><strong>Ваш ответ:</strong> ${selected.join(', ') || 'Не выбрано'}</p>
                                <p><strong>Верный ответ:</strong> ${q.correct.join(', ')}</p>
                                <p class="status ${isCorrect ? 'ok' : 'err'}">${isCorrect ? '✅ Верно!' : '❌ Неверно.'}</p>`;
      els.feedback.classList.remove('hidden');
      document.querySelectorAll('.option').forEach(optDiv => {
        const inp = optDiv.querySelector('input');
        if (q.correct.includes(inp.value)) optDiv.classList.add('correct');
        else if (inp.checked) optDiv.classList.add('incorrect');
      });
      els.btnNext.classList.remove('hidden'); els.btnNext.disabled = false;
    }

    function checkOpenAnswer(q) {
      if (answered) return;
      const input = document.getElementById('open-answer');
      const userAns = input.value.trim();
      if (!userAns) { alert('Введите ответ!'); return; }
      
      const correctArr = q.correct.map(a => normalize(a));
      const isCorrect = correctArr.includes(normalize(userAns));
      answered = true;
      state.answers.push({ q, selected: [userAns], isCorrect });
      input.disabled = true; document.getElementById('btn-check-open').disabled = true;

      els.feedback.innerHTML = `<p><strong>Ваш ответ:</strong> ${userAns}</p>
                                <p><strong>Верный ответ:</strong> ${q.correct.join(' / ')}</p>
                                <p class="status ${isCorrect ? 'ok' : 'err'}">${isCorrect ? '✅ Верно!' : '❌ Неверно.'}</p>`;
      els.feedback.classList.remove('hidden');
      els.btnNext.classList.remove('hidden'); els.btnNext.disabled = false;
    }

    els.btnNext.onclick = () => {
      if (state.currentIdx < state.test.length - 1) { state.currentIdx++; answered = false; renderQuestion(); }
      else finishTest();
    };

    function finishTest() {
      els.score.textContent = state.answers.filter(a => a.isCorrect).length;
      showScreen(els.results);
    }

    function renderReview() {
      els.reviewList.innerHTML = '';
      state.answers.forEach((a, i) => {
        const div = document.createElement('div'); div.className = 'review-item';
        const isOpen = a.q.type === 'open';
        div.innerHTML = `<div class="review-q">${i + 1}. ${a.q.question} ${isOpen ? '<span class="tag type">Открытый</span>' : ''}</div>
                         <div class="review-ans">Ваш ответ: <span class="tag ${a.isCorrect ? 'ok' : 'err'}">${a.selected.join(', ') || '-'}</span></div>
                         <div class="review-ans">Верный ответ: <span class="tag ok">${a.q.correct.join(' / ')}</span></div>
                         ${!a.isCorrect ? '<div style="color:var(--error); font-size:13px; margin-top:4px;">⚠️ Ответ неверный</div>' : ''}`;
        els.reviewList.appendChild(div);
      });
      showScreen(els.review);
    }

    els.btnStart.onclick = startTest;
    els.btnReview.onclick = renderReview;
    els.btnRetake.onclick = startTest;
    els.btnBack.onclick = () => showScreen(els.results);
  </script>
</body>
</html>
